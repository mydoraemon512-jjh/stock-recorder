// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// еӣӣеұӮзү№еҫҒйў„жөӢеј•ж“Һ
// T1=ж ёеҝғеҹәжң¬йқў(40%) T2=еҶіе®ҡжҖ§еҸҳйҮҸ(30%) T3=еҝғзҗҶ/еҺҶеҸІ(20%) N=еҷӘйҹі(10%,йҷҚжқғ)
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function fact(n){let r=1;for(let i=2;i<=n;i++)r*=i;return r}
function getH2H(h,a){return H2H[h+'|'+a]||H2H[a+'|'+h]||null}
function formScore(f){let s=0;for(const r of f){if(r==='W')s+=3;else if(r==='D')s+=1}return s/Math.max(1,f.length*3)*100}

function analyzeMatch(home,away){
  const ht=T[home],at=T[away];if(!ht||!at)return null;

  // в•җв•җв•җ T1: ж ёеҝғеҹәжң¬йқў (жқғйҮҚ40%) в•җв•җв•җ
  // xG/xGA (жңҖе…ій”®)
  const hXgRaw=(ht.xG-at.xGA+2.5)/5*100;
  const aXgRaw=(at.xG-ht.xGA+2.5)/5*100;
  // ELOиҜ„еҲҶ
  const hElo=(ht.elo-1500)/7;
  const aElo=(at.elo-1500)/7;
  // PPDA (йҖјжҠўејәеәҰпјҢи¶ҠдҪҺи¶ҠеҘҪ)
  const hPPDA=Math.max(0,(15-ht.ppda)/10*100);
  const aPPDA=Math.max(0,(15-at.ppda)/10*100);
  // е°„й—ЁиҪ¬еҢ–зҺҮ
  const hShC=ht.shotC*500;
  const aShC=at.shotC*500;
  // й—Ёе°Ҷжү‘ж•‘зҺҮ
  const hSv=ht.saveP*100;
  const aSv=at.saveP*100;
  // иө”зҺҮ(йҡҗеҗ«жҰӮзҺҮ, иө”зҺҮдҪҺ=е®һеҠӣејә)
  const hOdds=Math.max(5,100-Math.log10(ht.o||5000)*12);
  const aOdds=Math.max(5,100-Math.log10(at.o||5000)*12);
  // T1з»јеҗҲ
  const hT1=(hXgRaw*0.30+hElo*0.20+hPPDA*0.10+hShC*0.10+hSv*0.10+hOdds*0.20);
  const aT1=(aXgRaw*0.30+aElo*0.20+aPPDA*0.10+aShC*0.10+aSv*0.10+aOdds*0.20);

  // в•җв•җв•җ T2: еҶіе®ҡжҖ§еҸҳйҮҸ (жқғйҮҚ30%) в•җв•җв•җ
  // йҳөе®№иә«д»·
  const hVal=Math.min(100,ht.val/10);
  const aVal=Math.min(100,at.val/10);
  // йҳөе®№ж·ұеәҰ
  const hDep=ht.depth*10;
  const aDep=at.depth*10;
  // дјӨз—…еҪұе“Қ(ж ёеҝғзјәйҳөжүЈеҲҶ)
  const hInj=100-ht.inj*15;
  const aInj=100-at.inj*15;
  // зҠҜи§„йў‘зҺҮ(иҝҮй«ҳ=зәӘеҫӢе·®,зәўзүҢйЈҺйҷ©)
  const hFoul=Math.max(0,(20-ht.fouls)/15*100);
  const aFoul=Math.max(0,(20-at.fouls)/15*100);
  // жӣҝиЎҘиҙЎзҢ®(xG)
  const hSub=ht.subXg*200;
  const aSub=at.subXg*200;
  // T2з»јеҗҲ
  const hT2=(hVal*0.25+hDep*0.25+hInj*0.20+hFoul*0.15+hSub*0.15);
  const aT2=(aVal*0.25+aDep*0.25+aInj*0.20+aFoul*0.15+aSub*0.15);

  // в•җв•җв•җ T3: еҝғзҗҶ/еҺҶеҸІ/зҺ„еӯҰ (жқғйҮҚ20%) в•җв•җв•җ
  // дё–з•ҢжқҜиЎҖз»ҹ
  const hPed=ht.pedig*10;
  const aPed=at.pedig*10;
  // H2HжҲҳз»©
  const h2h=getH2H(home,away);
  let hH2H=50,aH2H=50,pH2H='',nH2H='';
  if(h2h){const t=h2h.w+h2h.d+h2h.l;hH2H=(h2h.w+h2h.d*0.5)/t*100;aH2H=(h2h.l+h2h.d*0.5)/t*100;pH2H=h2h.p;nH2H=h2h.n;}
  // зӮ№зҗғи®°еҪ•(ж·ҳжұ°иөӣе…ій”®)
  const hPen=ht.penR*100;
  const aPen=at.penR*100;
  // жҲҳж„Ҹ
  const hMot=(ht.mot||5)*10;
  const aMot=(at.mot||5)*10;
  // ж°”еҖҷйҖӮеә”
  const hClim=ht.clim*100;
  const aClim=at.clim*100;
  // T3з»јеҗҲ
  const hT3=(hPed*0.20+hH2H*0.20+hPen*0.15+hMot*0.30+hClim*0.15);
  const aT3=(aPed*0.20+aH2H*0.20+aPen*0.15+aMot*0.30+aClim*0.15);

  // в•җв•җв•җ N: еҷӘйҹіеұӮ (жқғйҮҚ10%,е·ІйҷҚжқғе№іж»‘) в•җв•җв•җ
  // FIFAжҺ’еҗҚвҶ’йҷҚжқғ(ELOжӣҙеҮҶ)
  const hRank=Math.max(0,(80-ht.elo*0.01)*1.0);
  const aRank=Math.max(0,(80-at.elo*0.01)*1.0);
  // иҝ‘жңҹзҠ¶жҖҒвҶ’е·Із”ЁformеҠ жқғ
  const hForm=formScore(ht.form);
  const aForm=formScore(at.form);
  // еҸӢи°Ҡиөӣз»“жһңвҶ’йҷҚжқғ50%
  // жҺ§зҗғзҺҮвҶ’дёҚйҮҮдҝЎ(жӯӨж•°жҚ®е·ІжңүPPDAжӣҝд»Ј)
  // Nз»јеҗҲ
  const hTN=(hRank*0.30+hForm*0.70);
  const aTN=(aRank*0.30+aForm*0.70);

  // в•җв•җв•җ жңҖз»ҲеҠ жқғ = T1*0.40 + T2*0.30 + T3*0.20 + N*0.10 в•җв•җв•җ
  const hTotal=hT1*0.40+hT2*0.30+hT3*0.20+hTN*0.10;
  const aTotal=aT1*0.40+aT2*0.30+aT3*0.20+aTN*0.10;

  // дё»е®ўеңә
  const hVenue=ht.homeS*1.05;
  const aVenue=at.awayS;

  // в•җв•җв•җ зҺ„еӯҰйў„иӯҰ в•җв•җв•җ
  const mystics=[];
  const hJC=getJerseyColor(home),aJC=getJerseyColor(away);
  if(hJC==='зҷҪ'&&hTotal>65)mystics.push({t:'вҡӘзҷҪиүІејәйҳҹжҳ“зҝ»иҪҰ',l:'danger'});
  const clash=JC[hJC];
  if(clash&&clash.weak&&clash.weak.includes(aJC))mystics.push({t:`рҹ”ҙ ${hJC}иў«${aJC}е…ӢеҲ¶`,l:'danger'});
  if(clash&&clash.strong&&clash.strong.includes(aJC))mystics.push({t:`рҹҹў ${hJC}е…Ӣ${aJC}`,l:'info'});
  if(pH2H==='е…Ӣжҳҹ')mystics.push({t:'вҡЎеҺҶеҸІе…ӢжҳҹпјҒH2HеҠЈеҠҝ',l:'danger'});
  if(pH2H==='е№іеұҖеӨҡ')mystics.push({t:'рҹ”®дәӨй”Ӣжҳ“е№і',l:'warn'});
  if(hTotal>80&&aTotal<35)mystics.push({t:'вҡ пёҸеӨ§зғӯеҝ…жӯ»йў„иӯҰ',l:'warn'});
  if((home==='еўЁиҘҝе“Ҙ'||home==='зҫҺеӣҪ'||home==='еҠ жӢҝеӨ§')&&ht.mot>=9)mystics.push({t:'рҹҸҹпёҸдёңйҒ“дё»жҲҳж„ҸMAX',l:'info'});
  if(nH2H&&nH2H.includes('еҶіиөӣ'))mystics.push({t:'рҹ”ҘеҶіиөӣйҮҚжј”',l:'warn'});
  if(nH2H&&nH2H.includes('7-1'))mystics.push({t:'рҹ’Җ7-1йҳҙеҪұ',l:'danger'});
  // ж—…иЎҢз–ІеҠі
  if(ht.trav>5000)mystics.push({t:`вңҲпёҸ ${home}й•ҝйҖ”ж—…иЎҢ${ht.trav}km`,l:'warn'});
  if(at.trav>5000)mystics.push({t:`вңҲпёҸ ${away}й•ҝйҖ”ж—…иЎҢ${at.trav}km`,l:'warn'});
  // ж°”еҖҷдёҚйҖӮ
  if(ht.clim<0.7)mystics.push({t:`рҹҢЎпёҸ ${home}ж°”еҖҷдёҚйҖӮ`,l:'warn'});
  if(at.clim<0.7)mystics.push({t:`рҹҢЎпёҸ ${away}ж°”еҖҷдёҚйҖӮ`,l:'warn'});

  // жіҠжқҫlambda
  const hLambda=Math.max(0.3,hTotal/100*2.5*hVenue);
  const aLambda=Math.max(0.2,aTotal/100*2.0*aVenue);

  return{
    hTotal:Math.round(hTotal),aTotal:Math.round(aTotal),
    // T1еҲҶи§Ј
    hT1:Math.round(hT1),aT1:Math.round(aT1),
    hXg:Math.round(hXgRaw),aXg:Math.round(aXgRaw),
    hElo:Math.round(hElo),aElo:Math.round(aElo),
    // T2еҲҶи§Ј
    hT2:Math.round(hT2),aT2:Math.round(aT2),
    hVal:Math.round(hVal),aVal:Math.round(aVal),
    hDep:Math.round(hDep),aDep:Math.round(aDep),
    // T3еҲҶи§Ј
    hT3:Math.round(hT3),aT3:Math.round(aT3),
    hMot:Math.round(hMot),aMot:Math.round(aMot),
    hH2H:Math.round(hH2H),aH2H:Math.round(aH2H),
    // N
    hForm:Math.round(hForm),aForm:Math.round(aForm),
    // е…¶д»–
    pH2H,nH2H,mystics,hLambda,aLambda,hVenue,aVenue,
    hxG:ht.xG,hxGA:ht.xGA,axG:at.xG,axGA:at.xGA,
  };
}

function predict(home,away){
  const a=analyzeMatch(home,away);
  if(!a)return{scores:[{score:'?',prob:'0'}],hWin:0,draw:0,aWin:0,analysis:a};
  const scores=[];
  for(let h=0;h<=6;h++)for(let aw=0;aw<=6;aw++){
    const ph=Math.exp(-a.hLambda)*Math.pow(a.hLambda,h)/fact(h);
    const pa=Math.exp(-a.aLambda)*Math.pow(a.aLambda,aw)/fact(aw);
    if(ph*pa>0.001)scores.push({h,aw,p:ph*pa});
  }
  scores.sort((x,y)=>y.p-x.p);
  const top3=scores.slice(0,3).map(s=>({score:s.h+'-'+s.aw,prob:(s.p*100).toFixed(1)}));
  let hWin=0,draw=0,aWin=0;
  for(const s of scores.slice(0,20)){if(s.h>s.aw)hWin+=s.p;else if(s.h<s.aw)aWin+=s.p;else draw+=s.p;}
  const t=hWin+draw+aWin;
  return{scores:top3,hWin:Math.round(hWin/t*100),draw:Math.round(draw/t*100),aWin:Math.round(aWin/t*100),analysis:a};
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// GROUP STANDINGS + BRACKET + VIEWS
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function getStandings(grp){
  const teams=GROUPS[grp].map(t=>({name:t,pts:0,gf:0,ga:0,gd:0,pl:0,w:0,d:0,l:0}));
  for(const m of SCHEDULE.filter(m=>m.grp===grp)){
    const r=getResult(m);if(!r)continue;
    const hi=teams.findIndex(t=>t.name===m.home),ai=teams.findIndex(t=>t.name===m.away);
    teams[hi].pl++;teams[ai].pl++;teams[hi].gf+=r[0];teams[hi].ga+=r[1];teams[ai].gf+=r[1];teams[ai].ga+=r[0];
    if(r[0]>r[1]){teams[hi].pts+=3;teams[hi].w++;teams[ai].l++}else if(r[0]<r[1]){teams[ai].pts+=3;teams[ai].w++;teams[hi].l++}else{teams[hi].pts+=1;teams[ai].pts+=1;teams[hi].d++;teams[ai].d++}
  }
  for(const t of teams)t.gd=t.gf-t.ga;
  teams.sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);
  return teams;
}
function getAllStandings(){
  const all=[];
  for(const g of Object.keys(GROUPS)){const s=getStandings(g);s.forEach((t,i)=>{t.grp=g;t.pos=i+1;t.advance=i<2});all.push(...s);}
  const thirds=all.filter(t=>t.pos===3).sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);
  thirds.forEach((t,i)=>{t.bestThird=i<8;t.thirdRank=i+1});
  return all;
}
function renderGroups(){
  let html='';
  for(const g of Object.keys(GROUPS)){
    const s=getStandings(g);
    html+=`<div class="card"><h3>${g}з»„</h3><table class="standings"><tr><th>зҗғйҳҹ</th><th>иөӣ</th><th>иғң</th><th>е№і</th><th>иҙҹ</th><th>иҝӣ</th><th>еӨұ</th><th>еҮҖ</th><th>еҲҶ</th></tr>`;
    for(const t of s){let cls='';if(t.pos<=2)cls='advance';html+=`<tr class="${cls}"><td>${flag(t.name)} ${t.name}</td><td>${t.pl}</td><td>${t.w}</td><td>${t.d}</td><td>${t.l}</td><td>${t.gf}</td><td>${t.ga}</td><td>${t.gd>0?'+':''}${t.gd}</td><td style="font-weight:900">${t.pts}</td></tr>`;}
    html+=`</table></div>`;
  }
  document.getElementById('groupStandings').innerHTML=html;
}
function getQualifiedTeams(){
  const all=getAllStandings(),qualified=[];
  for(const g of Object.keys(GROUPS)){const gt=all.filter(t=>t.grp===g);qualified.push(...gt.filter(t=>t.pos<=2).map(t=>({...t,seed:'G'+g+t.pos})));}
  const thirds=all.filter(t=>t.pos===3&&t.bestThird);thirds.forEach(t=>qualified.push({...t,seed:'3rd-'+t.thirdRank}));
  return qualified.sort((a,b)=>{const o={'G':0,'3':1};return(o[a.seed[0]]||0)-(o[b.seed[0]]||0)||a.grp.localeCompare(b.grp)||a.pos-b.pos;});
}
function renderBracket(){
  const qualified=getQualifiedTeams(),hasRealData=qualified.filter(t=>t.pts>0||t.pl>0).length>=4;
  const rounds=['1/16еҶіиөӣ','1/8еҶіиөӣ','1/4еҶіиөӣ','еҚҠеҶіиөӣ','еҶіиөӣ'],slots=[16,8,4,2,1];
  let bt=hasRealData?qualified.slice(0,32):[];
  let html='<div class="bracket">';
  for(let ri=0;ri<rounds.length;ri++){
    html+=`<div class="bracket-round"><div class="r-title">${rounds[ri]}</div>`;
    for(let si=0;si<slots[ri];si++){
      let c='';
      if(ri===0&&bt[si*2]&&bt[si*2+1]){const t1=bt[si*2],t2=bt[si*2+1];c=`<div class="b-team">${flag(t1.name)} ${t1.name}</div><div style="font-size:8px;color:#64748b">vs</div><div class="b-team">${flag(t2.name)} ${t2.name}</div><div class="b-note">${t1.grp}з»„${t1.pos} vs ${t2.grp}з»„${t2.pos}</div>`;}
      else if(ri===0)c=`<div class="b-team pending">еҫ…е®ҡ</div><div style="font-size:8px;color:#64748b">vs</div><div class="b-team pending">еҫ…е®ҡ</div>`;
      else c=`<div class="b-team pending">вҖ”</div><div class="b-note">R${ri+1}иғңиҖ…</div>`;
      html+=`<div class="bracket-slot" style="margin-bottom:${ri<3?4:0}px">${c}</div>`;
    }
    html+=`</div>`;
  }
  html+=`</div>`;
  if(!hasRealData)html='<div style="text-align:center;padding:40px;color:#64748b">вҡ пёҸ е°Ҹз»„иөӣж•°жҚ®дёҚи¶і<br>иҜ·е…Ҳиҫ“е…ҘжҜ”иөӣз»“жһң</div>';
  document.getElementById('bracketView').innerHTML=html;
}

}
function resetAllResults(){if(confirm('зЎ®е®ҡжё…йҷӨжүҖжңүжҜ”еҲҶж•°жҚ®пјҹ')){RESULTS={};saveResults();setDefaults();renderAll();}}
function renderAll(){renderDayTabs();if(currentView==='schedule')showDay(currentDay);if(currentView==='groups')renderGroups();if(currentView==='bracket')renderBracket();}
function updateStatus(){const t=Object.keys(RESULTS).length;document.getElementById('statusBar').textContent=`еӣӣеұӮзү№еҫҒжЁЎеһӢпјҡT1еҹәжң¬йқў+T2еҶіе®ҡжҖ§+T3еҝғзҗҶеҺҶеҸІ+NеҷӘйҹіиҝҮж»Ө | ${t}/${SCHEDULE.length}еңәе·ІеҮәз»“жһң`;}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});
document.getElementById('scoreModal').addEventListener('click',e=>{if(e.target===document.getElementById('scoreModal'))closeModal();});

renderDayTabs();showDay(0);updateStatus();
</script>
