<html lang="zh">

<style>

*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#050510;color:#e0e8ff;font-family:'Noto Sans SC','PingFang SC',sans-serif;
  min-height:100vh;display:flex;justify-content:center;
  background-image:
    radial-gradient(ellipse at 20% 50%,rgba(59,130,246,0.08) 0%,transparent 50%),
    radial-gradient(ellipse at 80% 20%,rgba(139,92,246,0.06) 0%,transparent 50%),
    radial-gradient(ellipse at 50% 80%,rgba(34,197,94,0.05) 0%,transparent 50%);
}
.app{max-width:600px;width:100%;padding:16px}

/* 标题 */
h1{
  font-family:'Orbitron','Noto Sans SC',sans-serif;
  font-size:26px;text-align:center;margin-bottom:2px;letter-spacing:3px;
  background:linear-gradient(135deg,#60a5fa,#a78bfa,#22c55e);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 20px rgba(96,165,250,0.3));
}
.sub{text-align:center;font-size:11px;color:#4a5568;margin-bottom:10px}
.up{color:#4ade80}.down{color:#f87171}.warn{color:#fbbf24}.info{color:#60a5fa}

/* ===== 前三金库 ===== */
.top3{
  background:linear-gradient(135deg,rgba(30,40,60,0.9),rgba(15,20,40,0.95));
  border-radius:20px;padding:16px;margin-bottom:12px;
  border:1px solid rgba(251,191,36,0.3);
  box-shadow:0 0 30px rgba(251,191,36,0.08),inset 0 1px 0 rgba(255,255,255,0.03);
  position:relative;overflow:hidden;
}
.top3::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:conic-gradient(from 0deg,transparent,rgba(251,191,36,0.03),transparent,rgba(251,191,36,0.03),transparent);animation:rotate 10s linear infinite}
@keyframes rotate{to{transform:rotate(360deg)}}
.top3>*{position:relative;z-index:1}
.top3-title{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:900;text-align:center;margin-bottom:10px;letter-spacing:2px}
.top3-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.t3-card{
  background:rgba(15,20,40,0.8);border-radius:14px;padding:12px 8px;
  text-align:center;backdrop-filter:blur(10px);
  transition:transform .3s,box-shadow .3s;
}
.t3-card:hover{transform:translateY(-3px)}
.t3-card.gold{border:1px solid rgba(251,191,36,0.5);box-shadow:0 0 20px rgba(251,191,36,0.15)}
.t3-card.silver{border:1px solid rgba(148,163,184,0.3)}
.t3-card.bronze{border:1px solid rgba(217,119,6,0.3)}
.t3-rank{font-size:22px}
.t3-name{font-size:13px;font-weight:700;margin:2px 0}
.t3-code{font-size:10px;color:#64748b;font-family:monospace}
.t3-price{font-size:17px;font-weight:800;font-family:'Orbitron',monospace;margin:4px 0}
.t3-score{font-size:11px;color:#fbbf24;font-weight:700}
.t3-reason{font-size:9px;color:#64748b;margin-top:3px;line-height:1.3}

/* ===== 大盘环境卡 ===== */
.env-card{
  background:linear-gradient(135deg,rgba(30,40,60,0.8),rgba(15,20,40,0.9));
  border-radius:16px;padding:14px;margin-bottom:10px;
  border:1px solid rgba(96,165,250,0.2);
  backdrop-filter:blur(10px);
}
.env-title{font-size:12px;font-weight:700;color:#60a5fa;margin-bottom:6px;letter-spacing:1px}
.env-row{display:flex;gap:14px;font-size:11px;color:#94a3b8;flex-wrap:wrap}
.env-row b{color:#e2e8f0;font-family:'Orbitron',monospace}
.gauge{height:4px;border-radius:2px;background:rgba(255,255,255,0.06);overflow:hidden;margin-top:6px;display:flex}
.g-up{background:linear-gradient(90deg,#22c55e,#4ade80);transition:width .5s}
.g-down{background:linear-gradient(90deg,#ef4444,#f87171);transition:width .5s}

/* ===== 筛选 ===== */
.filters{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto}
.fbtn{
  padding:7px 14px;border-radius:20px;border:1px solid rgba(255,255,255,0.1);
  background:rgba(15,20,40,0.6);color:#94a3b8;font-size:11px;cursor:pointer;
  font-family:inherit;white-space:nowrap;backdrop-filter:blur(5px);
  transition:all .2s;
}
.fbtn:hover{border-color:rgba(96,165,250,0.3);color:#e2e8f0}
.fbtn.active{background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;border-color:transparent;box-shadow:0 0 12px rgba(37,99,235,0.3)}

/* ===== 股票卡片 ===== */
.card{
  background:linear-gradient(135deg,rgba(20,30,50,0.85),rgba(10,15,30,0.95));
  border-radius:16px;padding:16px;margin-bottom:8px;position:relative;
  border:1px solid rgba(255,255,255,0.06);backdrop-filter:blur(10px);
  transition:all .3s;
}
.card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(96,165,250,0.3),transparent);opacity:0;transition:opacity .3s}
.card:hover::after{opacity:1}
.card.top{border-color:rgba(251,191,36,0.4);box-shadow:0 0 24px rgba(251,191,36,0.06)}
.card.good{border-color:rgba(34,197,94,0.2)}
.card.watch{border-color:rgba(96,165,250,0.15)}
.card.low{border-color:rgba(255,255,255,0.05)}

.card .row{display:flex;justify-content:space-between;align-items:center}
.card .name{font-size:16px;font-weight:700}
.card .code{font-size:12px;color:#64748b;margin-left:8px;font-family:monospace}
.card .price{font-size:22px;font-weight:800;font-family:'Orbitron',monospace}
.card .chg{font-size:13px;font-weight:700;padding:3px 10px;border-radius:6px;font-family:'Orbitron',monospace}
.card .chg.up{background:rgba(34,197,94,.12);color:#4ade80}
.card .chg.down{background:rgba(239,68,68,.12);color:#f87171}

.metrics{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.04)}
.metric{text-align:center}
.metric .val{font-size:14px;font-weight:700;font-family:'Orbitron',monospace}
.metric .label{font-size:9px;color:#4a5568;margin-top:1px}
.metric .val.up{color:#4ade80}.metric .val.down{color:#f87171}.metric .val.w{color:#fbbf24}

.signals{margin-top:8px;display:flex;gap:4px;flex-wrap:wrap}
.sig{padding:3px 10px;border-radius:12px;font-size:10px;font-weight:600}
.sig.buy{background:rgba(34,197,94,.12);color:#4ade80;border:1px solid rgba(34,197,94,.2)}
.sig.warn{background:rgba(251,191,36,.1);color:#fbbf24;border:1px solid rgba(251,191,36,.15)}
.sig.info{background:rgba(96,165,250,.1);color:#60a5fa;border:1px solid rgba(96,165,250,.15)}

.verdict{margin-top:8px;font-size:12px;font-weight:700;text-align:right;font-family:'Orbitron',sans-serif;letter-spacing:1px}

/* 分析区 */
.reason{margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.04);font-size:11px;color:#64748b;line-height:1.6}
.reason .r-title{color:#60a5fa;font-weight:700;display:block;margin-top:6px;letter-spacing:1px}
.reason .r-title:first-child{margin-top:0}
.reason .r-item{display:flex;justify-content:space-between;padding:2px 0}
.reason .r-val{font-family:monospace;color:#e2e8f0}
.reason .r-conclusion{color:#fbbf24;font-weight:700;margin-top:6px;border-top:1px solid rgba(255,255,255,0.04);padding-top:4px}

.rec-btn{
  padding:6px 16px;border-radius:20px;border:1px solid rgba(255,255,255,0.1);
  background:rgba(15,20,40,0.6);color:#94a3b8;font-size:11px;cursor:pointer;
  font-family:inherit;backdrop-filter:blur(5px);transition:all .2s;
}
.rec-btn:hover{border-color:rgba(96,165,250,0.3);color:#e2e8f0}
.rec-item{font-size:11px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.03);display:flex;justify-content:space-between}
.rec-summary{font-size:13px;color:#fbbf24;font-weight:700;margin-top:8px;text-align:center;font-family:'Orbitron',sans-serif}

.loading{text-align:center;padding:40px;color:#4a5568;font-size:13px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
</style>
</head>

async function gbkFetch(url){const r=await fetch(url);const buf=await r.arrayBuffer();return new TextDecoder('gbk').decode(buf)}
async function fetchEastMoney(){try{const r=await fetch('https://push2.eastmoney.com/api/qt/clist/get?fid=f184&po=1&pz=500&pn=1&np=1&fltt=2&invt=2&fs=m:0+t:6,m:0+t:80,m:1+t:2,m:1+t:23&fields=f2,f3,f12,f14,f62,f66,f69,f184,f20');const d=await r.json();const m={};for(const i of(d.data||{}).diff||[]){m[i.f12]={winRate:i.f69||0,dragonTiger:i.f184||0,mainForce:i.f62||0,superBig:i.f66||0}}return m}catch(e){return{}}}

}
async function fetchStocks(){const emData=await fetchEastMoney();const stocks=[];for(let i=0;i<全部.length;i+=40){const b=全部.slice(i,i+40).map(c=>(c[0]==='6'||c[0]==='5'||c[0]==='9'?'sh':'sz')+c).join(',');try{const t=await gbkFetch('https://qt.gtimg.cn/q='+b);for(const l of t.split(';')){if(!l.includes('="'))continue;const m=l.match(/="(.+)"/);if(!m)continue;const f=m[1].split('~');if(f.length<50)continue;const em=emData[f[2]]||{};stocks.push({code:f[2],name:f[1],price:+f[3]||0,chgPct:+f[32]||0,vol:+f[6]||0,amount:+f[37]||0,volRatio:+f[49]||0,turnover:+f[38]||0,pe:+f[39]||0,mcap:+f[44]||0,inside:+f[7]||0,outside:+f[8]||0,yrLow:+f[68]||0,yrHigh:+f[67]||0,chg5:+f[62]||0,chg20:+f[64]||0,winRate:em.winRate||0,dragonTiger:em.dragonTiger||0,mainForce:em.mainForce||0,superBig:em.superBig||0})}}catch(e){continue}}return stocks}
function analyze(s,env){const si=[];let sc=0;const chg5=s.chg5||0,chg20=s.chg20||0;if(chg5>5&&chg20>0){si.push({t:'强势',c:'buy'});sc+=18}else if(chg5>0&&chg5<5&&chg20<5){si.push({t:'上升',c:'buy'});sc+=14}else if(chg5>-3&&chg5<=0){si.push({t:'蓄力',c:'buy'});sc+=12}else if(chg5<-10){si.push({t:'超跌',c:'buy'});sc+=10}else{si.push({t:'偏弱',c:'warn'});sc+=4};const nb=s.inside>0?(s.outside/s.inside*100-100):0;if(nb>20&&s.volRatio>1.2){si.push({t:'抢筹',c:'buy'});sc+=18}else if(nb>10&&s.volRatio>1){si.push({t:'FOL低',c:'buy'});sc+=15}else if(nb>20&&s.volRatio<0.8){si.push({t:'暗吸',c:'buy'});sc+=12}else if(nb>0){si.push({t:'偏多',c:'info'});sc+=8}else{si.push({t:'偏空',c:'warn'});sc+=3};const ld=s.yrLow>0?(s.price/s.yrLow-1)*100:99;if(ld<10&&chg5>-5){si.push({t:'底部',c:'buy'});sc+=9}else if(ld<20){si.push({t:'低',c:'info'});sc+=7}else{sc+=4};const dc=s.chgPct||0;if(dc>2&&s.volRatio>1.5){si.push({t:'尾抢',c:'buy'});sc+=9}else if(dc>-1&&dc<1&&nb>10){si.push({t:'蓄力',c:'buy'});sc+=8}else{sc+=5};if(s.pe>0&&s.pe<30)sc+=4;else if(s.pe>0&&s.pe<60)sc+=2;const wr=s.winRate||0,dt=s.dragonTiger||0;if(wr>55){sc+=12;si.push({t:'胜'+wr.toFixed(0)+'%',c:'buy'})}else if(wr>40){sc+=8;si.push({t:'胜'+wr.toFixed(0)+'%',c:'info'})}else if(wr>0){sc+=4};if(dt>50){sc+=8;si.push({t:'龙虎',c:'buy'})}else if(dt>30){sc+=4;si.push({t:'龙虎',c:'info'})};const vr=s.volRatio||0,tr=s.turnover||0;if(vr>2&&tr>5){sc+=9;si.push({t:'放量',c:'buy'})}else if(vr>1.5&&tr>3){sc+=7;si.push({t:'放量',c:'buy'})}else if(vr>1&&tr>1){sc+=5;si.push({t:'放量',c:'info'})}else if(vr<0.5){sc+=3;si.push({t:'地量',c:'warn'})}else sc+=4;if(tr>8&&Math.abs(dc)>3&&s.outside>s.inside){sc+=5;si.push({t:'换手',c:'buy'})}else if(tr>5&&s.outside>s.inside){sc+=3;si.push({t:'换手',c:'info'})};const tv=s.vol||0,mr2=(s.mainForce||0)/Math.max(1,tv);if(mr2>0.5){sc+=4;si.push({t:'机构',c:'buy'})}else if(mr2<0.3&&dc>5){sc-=3;si.push({t:'散户',c:'warn'})}else if(mr2<0.4){sc+=3;si.push({t:'低 NOISE',c:'info'})};if(env&&env.sentiment){const a=Math.round(env.sentiment*0.8);sc+=a;if(a>2)si.push({t:'TAIL胜D',c:'buy'});if(a<-2)si.push({t:'HEAD胜D',c:'warn'})};if(env&&env.etfRatio>0.6)sc+=3;
  // 民间热度（散户参与度+换手率+量比综合）
  const retailPop=(tr>5?3:tr>2?1:0)+(vr>1.5?3:vr>1?1:0)+(Math.abs(dc)>5?2:0);
  if(retailPop>=6){si.push({t:'人气王',c:'buy'});sc+=6}
  else if(retailPop>=3){si.push({t:'热度',c:'info'});sc+=3}
  else if(retailPop<2&&tr<1){si.push({t:'冷门',c:'warn'})}let vd,gd;if(sc>=55){vd='⭐ 高 胜';gd='top'}else if(sc>=45){vd='👍 推荐';gd='good'}else if(sc>=35){vd='📋 关注';gd='watch'}else{vd='👀 观察';gd='low'};return{signals:si,score:sc,verdict:vd,grade:gd,netBuy:nb,lowDist:ld}}
function genConclusion(s){const p=[];if(s.chg5>3)p.push('短期趋势走强，惯性有望延续');else if(s.chg5>0)p.push('趋势温和向上，蓄力待发');else if(s.chg5>-5)p.push('横盘整理中，突破在即');else p.push('超跌区域，反弹动能积累');if(s.winRate>55)p.push('AI模型预测明日胜率'+s.winRate.toFixed(0)+'%');else if(s.winRate>40)p.push('AI胜率'+s.winRate.toFixed(0)+'%，偏正面');if(s.dragonTiger>50)p.push('龙虎榜资金强烈看多');if(s.netBuy>15&&s.volRatio>1)p.push('资金量能共振，明日高开概率大');if(s.volRatio>2&&s.turnover>5)p.push('量能爆发，机构参与度新高');else if(s.volRatio<0.5)p.push('缩量至地量，筹码锁定或吸筹中');if(s.mainForce&&s.vol){const mr3=s.mainForce/s.vol;if(mr3>0.5)p.push('机构控盘度高，散户噪声低')}return'💡 '+p.join('；')+'。'}
function render(stocks,env,ft){
  const az=stocks.map(s=>({...s,...analyze(s,env)})).sort((a,b)=>b.score-a.score);
  let fz=az;const pk={chip:POOLS.chip,optical:POOLS.optical,consumer:POOLS.consumer,semi:POOLS.semi,bank:POOLS.bank,power:POOLS.power,pcb:POOLS.pcb,cpo:POOLS.cpo,storage:POOLS.storage};
  if(pk[ft])fz=az.filter(s=>pk[ft].includes(s.code));
  const top=fz.slice(0,20);let h='';
  top.forEach(s=>{
    h+='<div class="card '+s.grade+'"><div class="row"><div><span class="name">'+s.name+'</span><span class="code">'+s.code+'</span></div><span class="chg '+(s.chgPct>0?'up':'down')+'">'+(s.chgPct>0?'+':'')+s.chgPct.toFixed(1)+'%</span></div><div class="row" style="margin-top:2px"><span class="price">'+s.price.toFixed(2)+'</span><span style="font-size:11px;color:#64748b">PE '+(s.pe>0?s.pe.toFixed(1):'--')+'</span></div><div class="metrics"><div class="metric"><div class="val '+(s.lowDist<15?'up':s.lowDist<30?'w':'down')+'">'+s.lowDist.toFixed(0)+'%</div><div class="label">距年低</div></div><div class="metric"><div class="val '+(s.netBuy>20?'up':s.netBuy>0?'w':'down')+'">'+(s.netBuy>0?'+':'')+s.netBuy.toFixed(0)+'%</div><div class="label">净买</div></div><div class="metric"><div class="val">'+s.volRatio.toFixed(1)+'x</div><div class="label">量比</div></div><div class="metric"><div class="val">'+s.turnover.toFixed(1)+'%</div><div class="label">换手</div></div><div class="metric"><div class="val info">'+Math.round(s.score)+'</div><div class="label">得分</div></div></div><div class="signals">'+s.signals.map(x=>'<span class="sig '+x.c+'">'+x.t+'</span>').join('')+'</div><div class="reason"><span class="r-title">📋 分析理由</span><div class="r-item"><span>估值</span><span class="r-val">PE '+(s.pe>0?s.pe.toFixed(1):'--')+(s.pe>0&&s.pe<30?' ✅ 低':s.pe>0&&s.pe<60?' ⚡ 中':' ⚠️ 高')+'</span></div><div class="r-item"><span>位置</span><span class="r-val">距年低 '+s.lowDist.toFixed(0)+'%'+(s.lowDist<10?' ✅ 底部':s.lowDist<20?' 📍 低':' ⚠️ 中位')+'</span></div><div class="r-item"><span>资金</span><span class="r-val">净买比 '+(s.netBuy>0?'+':'')+s.netBuy.toFixed(0)+'%'+(s.netBuy>20?' 🔥 主力':s.netBuy>10?' ✅ 流入':' 👀 正常')+'</span></div><div class="r-item"><span>胜率</span><span class="r-val">'+(s.winRate>0?s.winRate.toFixed(0)+'%':'--')+' · 龙虎'+s.dragonTiger.toFixed(0)+'分</span></div><div class="r-item"><span>市值</span><span class="r-val">'+(s.mcap>10000?(s.mcap/10000).toFixed(0)+'T':s.mcap.toFixed(0)+'亿')+'</span></div><span class="r-conclusion">'+genConclusion(s)+'</span></div><div class="verdict" style="color:'+(s.grade==='top'?'#fbbf24':s.grade==='good'?'#4ade80':'#60a5fa')+'">'+s.verdict+' · '+Math.round(s.score)+'分</div></div>';
  });
  document.getElementById('results').innerHTML=h||'<div class="loading">暂无数据</div>';
  document.getElementById('updateTime').textContent=new Date().toLocaleTimeString();
  const t3=az.slice(0,3);const mds=['🥇','🥈','🥉'];const sts=['gold','silver','bronze'];
  document.getElementById('top3Grid').innerHTML=t3.map((s,i)=>'<div class="t3-card '+sts[i]+'"><div class="t3-rank">'+mds[i]+'</div><div class="t3-name">'+s.name+'</div><div class="t3-code">'+s.code+'</div><div class="t3-price '+(s.chgPct>0?'up':'down')+'">'+s.price.toFixed(2)+' <span style="font-size:11px">'+(s.chgPct>0?'+':'')+s.chgPct.toFixed(1)+'%</span></div><div class="t3-score">'+Math.round(s.score)+'分</div><div class="t3-reason">'+s.lowDist.toFixed(0)+'%距低 · PE'+s.pe.toFixed(0)+' · +'+s.netBuy.toFixed(0)+'%</div></div>').join('');
}
async function load(){
  document.getElementById('results').innerHTML='<div class="loading">⏳ 扫描中...</div>';
  await fetchSentiment();allStocks=await fetchStocks();render(allStocks,marketEnv,currentFilter);
}
function filter(type){
  currentFilter=type;const mp={all:'全部',semi:'半导体',chip:'芯片AI',optical:'光通信',pcb:'PCB',bank:'银行',power:'电力',consumer:'消费',cpo:'CPO',storage:'存储'};
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.toggle('active',mp[type]===b.textContent.trim()));
  if(allStocks.length>0)render(allStocks,marketEnv,type);
}
function getRecords(){try{return JSON.parse(localStorage.getItem('stock_picks')||'[]')}catch(e){return[]}}
function saveRecords(r){localStorage.setItem('stock_picks',JSON.stringify(r))}
function recordTop3(){
  const az=allStocks.map(s=>({...s,...analyze(s,marketEnv)})).sort((a,b)=>b.score-a.score).slice(0,3);
  const rc=getRecords();const td=new Date().toISOString().slice(0,10);
  if(rc.find(r=>r.date===td)){alert('今天已记录');return}
  rc.push({date:td,time:new Date().toLocaleTimeString(),picks:az.map(s=>({code:s.code,name:s.name,price:s.price,chgPct:s.chgPct,score:Math.round(s.score)})),closed:false});
  saveRecords(rc);alert('✅ ✅ 前三名已记录！');
}
function showRecords(){
  document.getElementById('recordsPanel').style.display='block';document.getElementById('results').style.display='none';
  const rc=getRecords();let h='',tp=0,up=0;
  for(const r of rc.reverse()){h+='<div style="font-size:12px;color:#64748b;margin:8px 0 4px">📅 '+r.date+' '+r.time+'</div>';
    for(const p of r.picks||[]){
      tp++;const cd=r.closed&&r.closeData?r.closeData.find(c=>c.code===p.code):null;let rs='';
      if(cd){if(cd.closeChg>p.chgPct)rs='📈';else if(cd.closeChg<0)rs='📉';else rs='➡️';if(cd.closeChg>0)up++}
      h+='<div class="rec-item"><span>'+p.name+' <span style="color:#64748b">'+p.code+'</span></span><span>'+p.score+'分 '+(p.chgPct>0?'+':'')+p.chgPct.toFixed(1)+'% '+rs+' '+(cd?'→收 '+cd.closeChg.toFixed(1)+'%':'')+'</span></div>'
    }
  }
  const wr2=tp>0?(up/tp*100).toFixed(0):'--';
  h+='<div class="rec-summary">📊 '+rc.length+'天 · '+tp+'推荐 · '+up+'胜 · '+wr2+'% 胜率</div>';
  document.getElementById('recordsList').innerHTML=h||'暂无记录';
}
function hideRecords(){document.getElementById('recordsPanel').style.display='none';document.getElementById('results').style.display='block'}
load();setInterval(load,30000);
</script>
