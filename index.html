<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>📊 荐股追踪</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f172a;color:#e2e8f0;font-family:'PingFang SC',sans-serif;min-height:100vh;display:flex;justify-content:center}
.app{max-width:600px;width:100%;padding:20px}
h1{text-align:center;color:#fbbf24;margin-bottom:8px;font-size:22px}
.up{color:#22c55e}.down{color:#ef4444}.warn{color:#fbbf24}
.card{background:#1e293b;border-radius:14px;padding:16px;margin-bottom:8px}
.</style>
</head>
<body>
<div class="app">
  <h1>📊 荐股追踪记录</h1>
  <div id="content"><div style="text-align:center;padding:40px;color:#64748b">加载中...</div></div>
</div>
<script>
async function load(){
  try{
    const r=await fetch('records.json');
    const records=await r.json();
    let totalPick=0,upPick=0,totalDays=records.length;
    let html='';
    for(const rec of records.reverse()){
      html+=`<div class="card"><div style="font-size:12px;color:#64748b;margin-bottom:4px">📅 ${rec.date} · ${rec.pickTime}</div>`;
      for(const p of rec.picks||[]){
        totalPick++;
        const close=rec.closeData?rec.closeData.find(c=>c.code===p.code):null;
        let result='',chgClass='';
        if(close&&close.closeChg>p.chgPct)result='📈';
        else if(close&&close.closeChg<0)result='📉';
        else if(close)result='➡️';
        if(close&&close.closeChg>0){upPick++;chgClass='up'}
        else if(close&&close.closeChg<0)chgClass='down';
        html+=`<div style="display:flex;justify-content:space-between;font-size:12px;padding:2px 0;border-bottom:1px solid #1e293b">
          <span>${p.name} <span style="color:#64748b">${p.code}</span></span>
          <span>${p.score}分 推${p.chgPct>0?'+':''}${p.chgPct}% ${result} ${close?`<span class="${chgClass}">收${close.closeChg>0?'+':''}${close.closeChg}%</span>`:''}</span>
        </div>`;
      }
      html+=`</div>`;
    }
    const wr=totalPick>0?(upPick/totalPick*100).toFixed(0):'--';
    html=`<div style="text-align:center;font-size:16px;font-weight:700;color:#fbbf24;margin-bottom:16px">📊 ${totalDays}天 · ${totalPick}只推荐 · ${upPick}只收涨 · 胜率 ${wr}%</div>`+html;
    document.getElementById('content').innerHTML=html;
  }catch(e){document.getElementById('content').innerHTML='暂无记录数据'}
}
load();
</script>
</body>
</html>
