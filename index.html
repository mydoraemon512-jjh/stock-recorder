.app{max-width:600px;width:100%;padding:16px}

.sub{text-align:center;font-size:11px;color:#64748b;margin-bottom:10px}
.up{color:#ef4444}.down{color:#22c55e}.warn{color:#fbbf24}.info{color:#60a5fa}

/* 市场环境卡片 */
.env-card{
  background:linear-gradient(135deg,#1e293b,#0f172a);border-radius:12px;
  padding:12px;margin-bottom:10px;border:1px solid #334155
}
.env-title{font-size:12px;font-weight:700;color:#fbbf24;margin-bottom:6px}
.env-row{display:flex;gap:12px;font-size:11px;color:#94a3b8;flex-wrap:wrap}
.env-row b{color:#e2e8f0}
.env-score{font-size:14px;font-weight:700;margin-top:4px}
.gauge{height:6px;border-radius:3px;background:#334155;overflow:hidden;margin-top:6px;display:flex}
.g-up{background:#22c55e}.g-down{background:#ef4444}

/* 筛选按钮 */
.filters{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:10px}
.fbtn{
  flex:1;padding:8px;border-radius:8px;border:1px solid #334155;
  background:#1e293b;color:#94a3b8;font-size:12px;cursor:pointer;font-family:inherit
}
.fbtn.active{background:#fbbf24;color:#1e293b;border-color:#fbbf24;font-weight:700}

/* 结果卡片 */
.card{
  background:#1e293b;border-radius:14px;padding:14px;margin-bottom:8px;
  border-left:4px solid #334155;
}
.card.top{border-left-color:#fbbf24}
.card.good{border-left-color:#22c55e}
.card.watch{border-left-color:#60a5fa}
.card.low{border-left-color:#334155}

/* 前五 */
.top5{background:linear-gradient(135deg,#1e293b,#0f172a);border-radius:16px;padding:14px;margin-bottom:12px;border:2px solid #fbbf24}
.top5-title{font-size:16px;font-weight:900;color:#fbbf24;text-align:center;margin-bottom:10px}
.top5-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.t5-card{background:#0f172a;border-radius:12px;padding:10px;text-align:center;position:relative;overflow:hidden}
.t5-card.gold{border:2px solid #fbbf24;box-shadow:0 0 16px rgba(251,191,36,.2)}
.t5-card.silver{border:2px solid #94a3b8}
.t5-card.bronze{border:2px solid #d97706}
.t5-rank{font-size:20px;font-weight:900;margin-bottom:2px}
.t5-name{font-size:13px;font-weight:700}
.t5-code{font-size:10px;color:#64748b}
.t5-price{font-size:16px;font-weight:800;font-family:monospace;margin:4px 0}
.t5-score{font-size:11px;color:#fbbf24;font-weight:700}
.t5-reason{font-size:9px;color:#94a3b8;margin-top:4px;line-height:1.3}
.rec-btn{padding:6px 14px;border-radius:8px;border:1px solid #334155;background:#1e293b;color:#94a3b8;font-size:11px;cursor:pointer;font-family:inherit}
.rec-btn:active{background:#fbbf24;color:#1e293b}
.rec-item{font-size:11px;padding:4px 0;border-bottom:1px solid #1e293b;display:flex;justify-content:space-between}
.rec-item .up{color:#ef4444}.rec-item .down{color:#22c55e}
.rec-summary{font-size:12px;color:#fbbf24;font-weight:700;margin-top:6px;text-align:center}

.card .row{display:flex;justify-content:space-between;align-items:center}
.card .name{font-size:16px;font-weight:700}
.card .code{font-size:12px;color:#94a3b8;margin-left:8px;font-family:monospace}
.card .price{font-size:20px;font-weight:800;font-family:monospace}
.card .chg{font-size:13px;font-weight:700;padding:2px 8px;border-radius:5px}
.card .chg.up{background:rgba(34,197,94,.15);color:#22c55e}
.card .chg.down{background:rgba(239,68,68,.15);color:#ef4444}

.metrics{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-top:8px;padding-top:8px;border-top:1px solid #334155}
.metric{text-align:center}
.metric .val{font-size:14px;font-weight:700}
.metric .label{font-size:10px;color:#64748b}
.metric .val.up{color:#ef4444}.metric .val.down{color:#22c55e}.metric .val.w{color:#fbbf24}

.signals{margin-top:6px;display:flex;gap:4px;flex-wrap:wrap}
.sig{padding:2px 8px;border-radius:5px;font-size:10px;font-weight:600}
.sig.buy{background:rgba(34,197,94,.15);color:#22c55e}
.sig.warn{background:rgba(251,191,36,.15);color:#fbbf24}
.sig.info{background:rgba(96,165,250,.15);color:#60a5fa}

.verdict{margin-top:6px;font-size:12px;font-weight:700;text-align:right}
.loading{text-align:center;padding:30px;color:#64748b;font-size:13px}

async function gbkFetch(url){
  const r=await fetch(url);const buf=await r.arrayBuffer();
  return new TextDecoder('gbk').decode(buf);
}

// ===== 市场环境 =====
let marketEnv={sentiment:0,trend:0,etfRatio:0}; // sentiment: -10 to +10

async function fetchMarketEnv(){
  try{
    // 指数K线
    const [sh,sz,cy]=await Promise.all([
      fetch('https://money.finance.sina.com.cn/quotes_service/api/json_v2.php/CN_MarketData.getKLineData?symbol=sh000001&scale=240&ma=no&datalen=10').then(r=>r.json()),
      fetch('https://money.finance.sina.com.cn/quotes_service/api/json_v2.php/CN_MarketData.getKLineData?symbol=sz399001&scale=240&ma=no&datalen=10').then(r=>r.json()),
      fetch('https://money.finance.sina.com.cn/quotes_service/api/json_v2.php/CN_MarketData.getKLineData?symbol=sz399006&scale=240&ma=no&datalen=10').then(r=>r.json()),
    ]);
    // 各指数趋势
    const calcTrend=k=>{if(!k.length)return 0;return((+k[k.length-1].close/+k[0].close-1)*100)};
    const trends=[calcTrend(sh),calcTrend(sz),calcTrend(cy)];
    const trendAvg=trends.reduce((a,b)=>a+b,0)/3;

    // ETF多空
    const etfCodes=['sh510050','sh510300','sh510500','sz159919','sz159915','sh588000','sh513100','sz159941'];
    const etfText=await gbkFetch('https://qt.gtimg.cn/q='+etfCodes.join(','));
    let up=0,down=0;
    for(const line of etfText.split(';')){
      const m=line.match(/="(.+)"/);if(!m)continue;
      const f=m[1].split('~');if(f.length<40)continue;
      if(+f[32]>0)up++;else down++;
    }
    const etfRatio=up/(up+down||1);
    const sentScore=(trendAvg*2)+(etfRatio-0.5)*10;

    marketEnv={sentiment:sentScore,trend:trendAvg,etfRatio};

    let sentimentLabel,color;
    if(sentScore>4){sentimentLabel='🟢 偏多，适合做多';color='#22c55e'}
    else if(sentScore>-4){sentimentLabel='🟡 震荡，精选个股';color='#fbbf24'}
    else{sentimentLabel='🔴 偏空，防御为主';color='#ef4444'}

    document.getElementById('envLabel').innerHTML=`<span style="color:${color};font-weight:700">${sentimentLabel}</span>`;
    document.getElementById('envCard').innerHTML=`
      <div class="env-title">🌍 市场环境（评分 ${sentScore.toFixed(1)}）</div>
      <div class="env-row">
        <span>指数趋势<b style="color:${trendAvg>0?'#22c55e':'#ef4444'}">${trendAvg>0?'+':''}${trendAvg.toFixed(1)}%</b></span>
        <span>ETF多空<b>${up}涨${down}跌</b></span>
        <span>纳斯达克<b id="nasdaqVal">--</b></span>
        <span>标普500<b id="spVal">--</b></span>
      </div>
      <div class="gauge"><div class="g-up" style="width:${(etfRatio*100).toFixed(0)}%"></div><div class="g-down" style="width:${((1-etfRatio)*100).toFixed(0)}%"></div></div>
    `;

    // 美股指数
    try{
      const usText=await gbkFetch('https://qt.gtimg.cn/q=usIXIC,usINX');
      for(const line of usText.split(';')){
        const m=line.match(/="(.+)"/);if(!m)continue;
        const f=m[1].split('~');
        if(f[2]==='IXIC')document.getElementById('nasdaqVal').textContent=(+f[32]>0?'+':'')+f[32]+'%';
        if(f[2]==='INX')document.getElementById('spVal').textContent=(+f[32]>0?'+':'')+f[32]+'%';
      }
    }catch(e){}

    return marketEnv;
  }catch(e){return null}
}

// ===== 股票拉取+分析 =====
async function fetchEastMoney(){
  try{
    const url='https://push2.eastmoney.com/api/qt/clist/get?fid=f184&po=1&pz=500&pn=1&np=1&fltt=2&invt=2&fs=m:0+t:6,m:0+t:80,m:1+t:2,m:1+t:23&fields=f2,f3,f12,f14,f62,f66,f69,f184,f20';
    const r=await fetch(url);const d=await r.json();const map={};
    for(const item of(d.data||{}).diff||[]){
      map[item.f12]={winRate:item.f69||0,dragonTiger:item.f184||0,mainForce:item.f62||0,superBig:item.f66||0};
    }
    return map;
  }catch(e){return{}}
}

async function fetchStocks(){
  const emData=await fetchEastMoney();
  const stocks=[];
  for(let i=0;i<ALL.length;i+=40){
    const batch=ALL.slice(i,i+40).map(c=>(c[0]==='6'||c[0]==='5'||c[0]==='9'?'sh':'sz')+c).join(',');
    try{
      const text=await gbkFetch('https://qt.gtimg.cn/q='+batch);
      for(const line of text.split(';')){
        if(!line.includes('="'))continue;
        const m=line.match(/="(.+)"/);if(!m)continue;
        const f=m[1].split('~');if(f.length<50)continue;
        const em=emData[f[2]]||{};
        stocks.push({
          code:f[2],name:f[1],price:+f[3]||0,prev:+f[4]||0,
          chgPct:+f[32]||0,vol:+f[6]||0,amount:+f[37]||0,
          volRatio:+f[49]||0,turnover:+f[38]||0,pe:+f[39]||0,
          mcap:+f[44]||0,inside:+f[7]||0,outside:+f[8]||0,
          yrLow:+f[68]||0,yrHigh:+f[67]||0,chg5:+f[62]||0,chg20:+f[64]||0,winRate:em.winRate||0,dragonTiger:em.dragonTiger||0,mainForce:em.mainForce||0,superBig:em.superBig||0,
        });
      }
    }catch(e){continue}
  }
  return stocks;
}

function analyze(s,env){
  const si=[];let sc=0;
  const chg5=s.chg5||0,chg20=s.chg20||0;
  const nb=s.inside>0?(s.outside/s.inside*100-100):0;
  const vr=s.volRatio||0,tr=s.turnover||0;
  const dc=s.chgPct||0,wr=s.winRate||0,dt=s.dragonTiger||0;
  const ld=s.yrLow>0?(s.price/s.yrLow-1)*100:99;
  const hd=s.yrHigh>0?(s.price/s.yrHigh-1)*100:-99;
  const hour=new Date().getHours();

  // === 1. 尾盘效应（核心20分）===
  const isLate=hour>=14||hour<10; // 尾盘或早盘竞价
  if(isLate&&nb>15&&vr>1.2&&dc>0){
    si.push({t:'尾盘抢筹',c:'buy'});sc+=18;
  }else if(isLate&&nb>10&&dc>-1){
    si.push({t:'尾盘蓄力',c:'buy'});sc+=14;
  }else if(isLate&&nb>5){
    si.push({t:'尾盘偏多',c:'info'});sc+=10;
  }else if(isLate){sc+=5}else{sc+=3}

  // === 2. 隔夜效应（15分）===
  if(dc>1&&dc<6&&nb>10&&vr>1){si.push({t:'隔夜看涨',c:'buy'});sc+=13}
  else if(dc>0&&dc<3&&nb>5){si.push({t:'温和偏多',c:'info'});sc+=9}
  else if(dc>-2&&dc<0&&nb>15){si.push({t:'洗盘吸筹',c:'buy'});sc+=11}
  else sc+=5;

  // === 3. 热点反应（15分）===
  const hotScore=(tr>5?5:tr>2?2:0)+(vr>1.5?5:vr>1?2:0)+(Math.abs(dc)>3?3:0);
  if(hotScore>=10){si.push({t:'人气爆棚',c:'buy'});sc+=13}
  else if(hotScore>=6){si.push({t:'热度上升',c:'buy'});sc+=10}
  else if(hotScore>=3){si.push({t:'温和关注',c:'info'});sc+=7}
  else{si.push({t:'冷门',c:'warn'});sc+=3}

  // === 4. 动量趋势（12分）===
  if(chg5>3&&chg20>0){si.push({t:'多头排列',c:'buy'});sc+=11}
  else if(chg5>0){si.push({t:'短线偏多',c:'buy'});sc+=9}
  else if(chg5>-3){si.push({t:'横盘筑底',c:'info'});sc+=7}
  else if(chg5<-8&&nb>10){si.push({t:'超跌反弹',c:'buy'});sc+=8}
  else{sc+=4}

  // === 5. 资金面（10分）===
  if(nb>25&&vr>1.3){si.push({t:'主力强攻',c:'buy'});sc+=9}
  else if(nb>12){si.push({t:'净流入',c:'buy'});sc+=7}
  else if(nb>0){si.push({t:'微偏多',c:'info'});sc+=5}
  else{sc+=2}

  // === 6. 位置安全（8分）===
  if(ld<8){si.push({t:'底部区',c:'buy'});sc+=7}
  else if(ld<18){si.push({t:'低位',c:'info'});sc+=5}
  else if(hd>-10&&chg5>0){si.push({t:'突破',c:'buy'});sc+=6}
  else sc+=3;

  // === 7. AI胜率+龙虎（10分）===
  if(wr>50){sc+=8;si.push({t:'AI高胜率'+wr.toFixed(0)+'%',c:'buy'})}
  else if(wr>35){sc+=5;si.push({t:'AI胜率'+wr.toFixed(0)+'%',c:'info'})}
  else if(wr>0)sc+=2;
  if(dt>45){sc+=6;si.push({t:'龙虎看多',c:'buy'})}
  else if(dt>25){sc+=3;si.push({t:'龙虎关注',c:'info'})}

  // === 8. 大盘共振（±6分）===
  if(env&&env.sentiment){
    const adj=Math.round(env.sentiment*0.8);sc+=adj;
    if(adj>2)si.push({t:'大盘助攻',c:'buy'});
    if(adj<-2)si.push({t:'逆势⚠️',c:'warn'});
  }
  if(env&&env.etfRatio>0.6)sc+=3;

  // === 排名 ===
  let vd,gd;
  if(sc>=55){vd='⭐ 强烈推荐';gd='top'}
  else if(sc>=45){vd='👍 推荐关注';gd='good'}
  else if(sc>=35){vd='📋 留意';gd='watch'}
  else{vd='👀 观察';gd='low'}

  return{signals:si,score:sc,verdict:vd,grade:gd,netBuy:nb,lowDist:ld};
}
function genConclusion(s){
  const parts=[];
  if(s.chg5>3)parts.push('短期趋势走强，惯性有望延续');
  else if(s.chg5>0)parts.push('趋势温和向上，蓄力待发');
  else if(s.chg5>-5)parts.push('横盘整理中，突破在即');
  else parts.push('超跌区域，反弹动能积累');

  if(s.winRate>55)parts.push("东方财富模型预测明日胜率"+s.winRate.toFixed(0)+"%");
  else if(s.winRate>40)parts.push("AI模型胜率"+s.winRate.toFixed(0)+"%偏正面");
  if(s.dragonTiger>50)parts.push("龙虎榜资金强烈看多");
  if(s.netBuy>15&&s.volRatio>1)parts.push('资金+量能共振，明日高开概率大');
  else if(s.netBuy>10)parts.push('主力持续吸筹，筹码集中度高');
  else parts.push('资金面平稳，等待放量确认');

  if(s.lowDist<10)parts.push('底部安全边际充足');
  return `💡 ${parts.join('；')}。`;
}

function render(stocks,env,filterType){
  const analyzed=stocks.map(s=>({...s,...analyze(s,env)}));
  analyzed.sort((a,b)=>b.score-a.score);

  let filtered=analyzed;
  const poolKeys={chip:POOLS.chip,optical:POOLS.optical,consumer:POOLS.consumer,semi:POOLS.semi,bank:POOLS.bank,power:POOLS.power,pcb:POOLS.pcb,cpo:POOLS.cpo,storage:POOLS.storage,baijiu:POOLS.baijiu,newenergy:POOLS.newenergy,pharma:POOLS.pharma,military:POOLS.military,broker:POOLS.broker,auto:POOLS.auto,ai_app:POOLS.ai_app,coal_metal:POOLS.coal_metal,robot:POOLS.robot};
  if(poolKeys[filterType])filtered=analyzed.filter(s=>poolKeys[filterType].includes(s.code));

  const top=filtered.slice(0,20);
  let html='';
  top.forEach(s=>{
    const chgClass=s.chgPct>0?'up':'down';
    html+=`
    <div class="card ${s.grade}">
      <div class="row"><div><span class="name">${s.name}</span><span class="code">${s.code}</span></div><span class="chg ${chgClass}">${s.chgPct>0?'+':''}${s.chgPct.toFixed(1)}%</span></div>
      <div class="row" style="margin-top:2px"><span class="price">${s.price.toFixed(2)}</span><span style="font-size:11px;color:#64748b">PE ${s.pe>0?s.pe.toFixed(1):'--'}</span></div>
      <div class="metrics">
        <div class="metric"><div class="val ${s.lowDist<15?'up':s.lowDist<30?'w':'down'}">${s.lowDist.toFixed(0)}%</div><div class="label">距年低</div></div>
        <div class="metric"><div class="val ${s.netBuy>20?'up':s.netBuy>0?'w':'down'}">${s.netBuy>0?'+':''}${s.netBuy.toFixed(0)}%</div><div class="label">净买比</div></div>
        <div class="metric"><div class="val">${s.volRatio.toFixed(1)}x</div><div class="label">量比</div></div>
        <div class="metric"><div class="val">${s.turnover.toFixed(1)}%</div><div class="label">换手率</div></div>
        <div class="metric"><div class="val info">${Math.round(s.score)}分</div><div class="label">综合</div></div>
      </div>
      <div class="signals">${s.signals.map(x=>`<span class="sig ${x.c}">${x.t}</span>`).join('')}</div>
      <div class="reason">
        <span class="r-title">📋 分析理由</span>
        <div class="r-item"><span>估值</span><span class="r-val">PE ${s.pe>0?s.pe.toFixed(1):'亏损'}${s.pe>0&&s.pe<25?' ✅ 低估值':s.pe>0&&s.pe<50?' ⚡ 适中':' ⚠️ 偏高'}</span></div>
        <div class="r-item"><span>位置</span><span class="r-val">距年低 ${s.lowDist.toFixed(0)}%${s.lowDist<8?' ✅ 底部区域':s.lowDist<20?' 📍 偏低':' ⚠️ 已脱离底部'}</span></div>
        <div class="r-item"><span>资金</span><span class="r-val">外盘比内盘多 ${s.netBuy.toFixed(0)}%${s.netBuy>20?' 🔥 主力吸筹':s.netBuy>10?' ✅ 资金关注':' 👀 一般'}</span></div>
        <div class="r-item"><span>量能</span><span class="r-val">量比 ${s.volRatio.toFixed(1)}x · 换手 ${s.turnover.toFixed(1)}%${s.volRatio<0.7&&s.chgPct<0?' ⚠️ 缩量阴跌':s.volRatio>1.5?' 🔥 放量活跃':' 📊 正常'}</span></div>
        <div class="r-item"><span>趋势</span><span class="r-val">5日 ${s.chg5>0?'+':''}${s.chg5.toFixed(1)}% · 20日 ${s.chg20>0?'+':''}${s.chg20.toFixed(1)}%</span></div>
        <div class="r-item"><span>胜率</span><span class="r-val">${s.winRate>0?s.winRate.toFixed(0)+"%":"--"} · 龙虎${s.dragonTiger.toFixed(0)}分</span></div>
        <div class="r-item"><span>散户噪声</span><span class="r-val">${s.mainForce&&s.vol?(s.mainForce/s.vol*100).toFixed(0)+'%机构':'-'}</span></div>
        <div class="r-item"><span>市值</span><span class="r-val">${s.mcap>10000?(s.mcap/10000).toFixed(0)+'万亿':s.mcap.toFixed(0)+'亿'}</span></div>
        <span class="r-conclusion">${genConclusion(s)}</span>
      </div>
      <div class="verdict" style="color:${s.grade==='top'?'#fbbf24':s.grade==='good'?'#22c55e':'#60a5fa'}">${s.verdict} · ${Math.round(s.score)}分</div>
    </div>`;
  });
  document.getElementById('results').innerHTML=html||'<div class="loading">暂无数据</div>';
  document.getElementById('updateTime').textContent=new Date().toLocaleTimeString();

  // 更新前五
  const top5=analyzed.slice(0,3);
  const medals=['🥇','🥈','🥉'];
  const styles=['gold','silver','bronze'];
  document.getElementById('top5Grid').innerHTML=top5.map((s,i)=>`
    <div class="t5-card ${styles[i]}">
      <div class="t5-rank">${medals[i]}</div>
      <div class="t5-name">${s.name}</div>
      <div class="t5-code">${s.code}</div>
      <div class="t5-price ${s.chgPct>0?'up':'down'}">${s.price.toFixed(2)} <span style="font-size:11px">${s.chgPct>0?'+':''}${s.chgPct.toFixed(1)}%</span></div>
      <div class="t5-score">${Math.round(s.score)}分</div>
      <div class="t5-reason">${s.lowDist.toFixed(0)}%距低 · PE${s.pe>0?s.pe.toFixed(0):'--'} · 买盘+${s.netBuy.toFixed(0)}%</div>
    </div>
  `).join('');
}

let allStocks=[],currentFilter='all';
async function load(){
  // 首次加载显示提示，后续静默刷新
  if(allStocks.length===0)document.getElementById('results').innerHTML='<div class="loading">⏳ 扫描全市场...</div>';
  else document.getElementById('updateTime').textContent='刷新中...';
  const env=await fetchMarketEnv();
  allStocks=await fetchStocks();
  render(allStocks,env,currentFilter);
}
function filter(type){
  currentFilter=type;
  document.querySelectorAll('.fbtn').forEach(b=>{
    const map={all:'全部',semi:'半导体',chip:'芯片',optical:'光通信',pcb:'PCB',bank:'银行',power:'电力',consumer:'消费',cpo:'CPO',storage:'存储',baijiu:'白酒',newenergy:'新能源',pharma:'医药',military:'军工',broker:'券商',auto:'汽车',ai_app:'AI应用',coal_metal:'有色',robot:'机器人'};
    b.classList.toggle('active',map[type]===b.textContent.trim());
  });
  if(allStocks.length>0)render(allStocks,marketEnv,type);
}
// ===== 记录系统 =====
function getRecords(){try{return JSON.parse(localStorage.getItem('stock_picks')||'[]')}catch(e){return[]}}
function saveRecords(r){localStorage.setItem('stock_picks',JSON.stringify(r))}

function recordTop3(){
  const analyzed=allStocks.map(s=>({...s,...analyze(s,marketEnv)})).sort((a,b)=>b.score-a.score);
  const top5=analyzed.slice(0,3);
  const records=getRecords();
  const today=new Date().toISOString().slice(0,10);
  // 检查今天是否已记录
  if(records.find(r=>r.date===today)){alert('今天已记录过前五名');return}
  records.push({
    date:today,time:new Date().toLocaleTimeString(),
    picks:top5.map(s=>({code:s.code,name:s.name,price:s.price,chgPct:s.chgPct,score:Math.round(s.score)})),
    closed:false
  });
  saveRecords(records);
  alert('✅ 今日前五已记录！收盘后自动更新收盘价。');
}

function updateClosePrices(){
  const records=getRecords();
  const today=new Date().toISOString().slice(0,10);
  let updated=false;
  for(const r of records){
    if(r.date===today&&!r.closed){
      // 更新收盘数据
      r.closed=true;
      // 收盘价用最后一笔数据
      r.closeData=r.picks.map(p=>({...p,closePrice:p.price,closeChg:p.chgPct}));
      updated=true;
    }
  }
  if(updated)saveRecords(records);
}

function showRecords(){
  document.getElementById('recordsPanel').style.display='block';
  document.getElementById('results').style.display='none';
  const records=getRecords();
  updateClosePrices();
  let html='';
  // 成功率
  let totalPicks=0,upPicks=0;
  for(const r of records.reverse()){
    html+=`<div style="font-size:12px;color:#64748b;margin:8px 0 4px">📅 ${r.date} ${r.time}</div>`;
    for(const p of r.picks||[]){
      totalPicks++;
      const closeOk=r.closed&&r.closeData?r.closeData.find(c=>c.code===p.code):null;
      let result='';
      if(closeOk){
        if(closeOk.closeChg>p.chgPct)result='<span class="up">📈</span>';
        else if(closeOk.closeChg<0)result='<span class="down">📉</span>';
        else result='➡️';
        if(closeOk.closeChg>0)upPicks++;
      }
      html+=`<div class="rec-item"><span>${p.name} <span style="color:#64748b">${p.code}</span></span><span>${p.score}分 ${p.chgPct>0?'+':''}${p.chgPct.toFixed(1)}% ${result}${closeOk?' → 收'+closeOk.closeChg.toFixed(1)+'%':''}</span></div>`;
    }
  }
  const winRate=totalPicks>0?(upPicks/totalPicks*100).toFixed(0):'--';
  html+=`<div class="rec-summary">📊 统计${records.length}天 · 共${totalPicks}只推荐 · 收盘上涨${upPicks}只 · 胜率 ${winRate}%</div>`;
  document.getElementById('recordsList').innerHTML=html||'暂无记录';
}
function hideRecords(){
  document.getElementById('recordsPanel').style.display='none';
  document.getElementById('results').style.display='block';
}

load();setInterval(load,10000); // 30秒刷新排行
