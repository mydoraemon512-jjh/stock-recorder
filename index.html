<title>🏆 2026世界杯 AI预测</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;color:#e2e8f0;font-family:'PingFang SC',sans-serif;min-height:100vh;display:flex;justify-content:center}
.app{max-width:700px;width:100%;padding:12px}
h1{text-align:center;color:#fbbf24;font-size:20px;margin-bottom:2px}
.sub{text-align:center;font-size:9px;color:#64748b;margin-bottom:8px}
.card{background:#111;border-radius:12px;padding:12px;margin-bottom:6px;border:1px solid #222}
h3{font-size:12px;color:#fbbf24;margin-bottom:4px}
.up{color:#ef4444}.down{color:#22c55e}.warn{color:#fbbf24}.info{color:#60a5fa}

/* Tabs */
.tabs{display:flex;gap:3px;margin-bottom:8px;flex-wrap:wrap}
.tab{padding:6px 10px;border-radius:16px;border:1px solid #334155;background:#111;color:#94a3b8;font-size:10px;cursor:pointer;font-family:inherit;white-space:nowrap}
.tab.active{background:#fbbf24;color:#0a0a1a;border-color:#fbbf24;font-weight:700}
.tab.has-result{border-color:#22c55e;color:#22c55e}
.tab.live{border-color:#ef4444;color:#ef4444;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}

/* Match card */
.match{display:flex;align-items:center;gap:8px;padding:4px 0}
.match .flag{font-size:26px;width:32px;text-align:center;flex-shrink:0}
.match .team{flex:1;font-size:12px;font-weight:700}
.match .role{font-size:8px;color:#64748b;display:block}
.match .vs{font-size:14px;font-weight:900;color:#334155}
.score-box{font-size:18px;font-weight:900;font-family:monospace;color:#fbbf24;text-align:center;min-width:50px}
.result-tag{display:inline-block;padding:1px 8px;border-radius:3px;font-size:10px;font-weight:700;color:#fbbf24;background:rgba(251,191,36,.15)}
.preds{display:flex;gap:4px;margin-top:4px}
.pred{flex:1;text-align:center;background:#1a1a2e;border-radius:8px;padding:5px 2px}
.pred .s{font-size:13px;font-weight:700;font-family:monospace;color:#fbbf24}
.pred .p{font-size:8px;color:#64748b}
.bar{height:3px;border-radius:2px;margin-top:2px;background:#222;overflow:hidden}
.bar-fill{height:100%;background:#fbbf24}
.wdl{display:flex;gap:10px;font-size:9px;color:#94a3b8;margin-top:3px}

/* Group standings */
.standings{width:100%;border-collapse:collapse;font-size:10px;margin-bottom:4px}
.standings th{color:#64748b;font-weight:400;padding:3px 4px;text-align:center;border-bottom:1px solid #222}
.standings th:first-child{text-align:left;width:80px}
.standings td{padding:3px 4px;text-align:center;border-bottom:1px solid #111}
.standings td:first-child{text-align:left;font-weight:700}
.standings tr.advance td{background:rgba(34,197,94,.08)}
.standings tr.advance td:first-child{color:#22c55e}
.standings tr.third-best td{background:rgba(251,191,36,.08)}
.standings tr.third-best td:first-child{color:#fbbf24}
.group-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:8px;margin-bottom:10px}

/* Knockout bracket */
.bracket-container{overflow-x:auto;padding:8px 0}
.bracket{display:flex;gap:16px;min-width:900px;font-size:10px}
.bracket-round{flex:1;display:flex;flex-direction:column;justify-content:space-around;gap:4px}
.bracket-round .r-title{font-size:9px;color:#64748b;text-align:center;margin-bottom:4px;font-weight:700}
.bracket-slot{background:#111;border:1px solid #222;border-radius:8px;padding:6px;text-align:center;min-width:70px}
.bracket-slot .b-team{font-size:10px;font-weight:700}
.bracket-slot .b-team.pending{color:#334155;font-style:italic}
.bracket-slot .b-score{font-size:14px;font-family:monospace;color:#fbbf24;font-weight:900}
.bracket-slot .b-note{font-size:7px;color:#64748b}

/* Score input modal */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:#1a1a2e;border-radius:16px;padding:20px;max-width:320px;width:90%;border:1px solid #334155}
.modal h3{color:#fbbf24;margin-bottom:12px;text-align:center;font-size:14px}
.modal .teams{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:12px}
.modal input{width:50px;height:40px;text-align:center;font-size:20px;font-weight:900;font-family:monospace;border-radius:8px;border:1px solid #334155;background:#0f172a;color:#fbbf24}
.modal button{padding:8px 20px;border-radius:8px;border:none;font-family:inherit;font-weight:700;cursor:pointer;font-size:12px}
.modal .btn-save{background:#fbbf24;color:#0a0a1a;margin-right:8px}
.modal .btn-cancel{background:#334155;color:#94a3b8}
.modal .btn-clear{background:#ef4444;color:#fff;margin-right:8px}

/* Controls bar */
.controls{display:flex;gap:6px;margin-bottom:8px;align-items:center;justify-content:flex-end}
.ctrl-btn{padding:5px 12px;border-radius:14px;border:1px solid #334155;background:#111;color:#94a3b8;font-size:10px;cursor:pointer;font-family:inherit}
.ctrl-btn.active{background:#22c55e;color:#000;border-color:#22c55e}

// ═══════════════════════════════════════════
function getStrength(name){
  const t=TEAMS[name];if(!t)return 20;
  return Math.max(5,80-t.r*0.3-Math.log10(t.o||50000)*10);
}
function fact(n){let r=1;for(let i=2;i<=n;i++)r*=i;return r}
function predict(home,away){
  const sh=getStrength(home),sa=getStrength(away);
  const lh=Math.max(0.3,1.6+(sh-sa)*0.02),la=Math.max(0.2,1.6+(sa-sh)*0.02);
  const scores=[];
  for(let h=0;h<=6;h++)for(let a=0;a<=6;a++){
    const ph=Math.exp(-lh)*Math.pow(lh,h)/fact(h),pa=Math.exp(-la)*Math.pow(la,a)/fact(a);
    if(ph*pa>0.002)scores.push({h,a,p:ph*pa})
  }
  scores.sort((a,b)=>b.p-a.p);
  return scores.slice(0,3).map(s=>({score:s.h+'-'+s.a,prob:(s.p*100).toFixed(1)}));
}

// ═══════════════════════════════════════════
// GROUP STANDINGS
// ═══════════════════════════════════════════
function getStandings(grp){
  const teams=GROUPS[grp].map(t=>({name:t,pts:0,gf:0,ga:0,gd:0,pl:0,w:0,d:0,l:0}));
  const matches=SCHEDULE.filter(m=>m.grp===grp);
  for(const m of matches){
    const r=getResult(m);if(!r)continue;
    const hi=teams.findIndex(t=>t.name===m.home),ai=teams.findIndex(t=>t.name===m.away);
    teams[hi].pl++;teams[ai].pl++;teams[hi].gf+=r[0];teams[hi].ga+=r[1];teams[ai].gf+=r[1];teams[ai].ga+=r[0];
    if(r[0]>r[1]){teams[hi].pts+=3;teams[hi].w++;teams[ai].l++}
    else if(r[0]<r[1]){teams[ai].pts+=3;teams[ai].w++;teams[hi].l++}
    else{teams[hi].pts+=1;teams[ai].pts+=1;teams[hi].d++;teams[ai].d++}
  }
  for(const t of teams)t.gd=t.gf-t.ga;
  teams.sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);
  return teams;
}

function getAllStandings(){
  const all=[];
  for(const g of Object.keys(GROUPS)){
    const s=getStandings(g);
    s.forEach((t,i)=>{t.grp=g;t.pos=i+1;t.advance=i<2});
    all.push(...s);
  }
  // Mark best 3rd place candidates
  const thirds=all.filter(t=>t.pos===3).sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);
  thirds.forEach((t,i)=>{t.bestThird=i<8;t.thirdRank=i+1});
  return all;
}

let editingMatch=null;
function openScoreModal(m){
  editingMatch=m;
  const r=getResult(m);
  document.getElementById('modalHome').textContent=flag(m.home)+' '+m.home;
  document.getElementById('modalAway').textContent=m.away+' '+flag(m.away);
  document.getElementById('modalMatchInfo').textContent=m.grp+'组 · '+m.bjt;
  document.getElementById('modalHomeScore').value=r?r[0]:0;
  document.getElementById('modalAwayScore').value=r?r[1]:0;
  document.getElementById('scoreModal').style.display='flex';
  setTimeout(()=>document.getElementById('modalHomeScore').focus(),100);
}
function closeModal(){document.getElementById('scoreModal').style.display='none';editingMatch=null}
function saveResult(){
  if(!editingMatch)return;
  const h=parseInt(document.getElementById('modalHomeScore').value)||0;
  const a=parseInt(document.getElementById('modalAwayScore').value)||0;
  setResult(editingMatch,h,a);closeModal();renderAll();
}
function clearResult(){
  if(!editingMatch)return;
  clearResultKey(editingMatch);closeModal();renderAll();
}

let currentDay=0;
function renderDayTabs(){
  const days=[...new Set(SCHEDULE.map(m=>m.d))].sort((a,b)=>a-b);
  const container=document.getElementById('dayTabs');
  container.innerHTML=days.map(d=>{
    const hasResult=SCHEDULE.filter(m=>m.d===d).some(m=>getResult(m));

  }).join('');
}

// ═══════════════════════════════════════════
// RENDER: Match list for a day
// ═══════════════════════════════════════════
function showDay(d){
  currentDay=d;renderDayTabs();
  const matches=SCHEDULE.filter(m=>m.d===d);
  let html='';
  for(const m of matches){
    const r=getResult(m);
    if(r){
      html+=`<div class="card" style="opacity:0.85;cursor:pointer" onclick="openScoreModal(SCHEDULE.find(x=>x.home==='${m.home}'&&x.away==='${m.away}'))">
        <div style="display:flex;justify-content:space-between;margin-bottom:2px">
        <span style="font-size:10px;color:#fbbf24">${m.grp}组 · 第${m.r}轮</span>
        <span style="font-size:9px;color:#64748b">${m.bjt} 北京时间</span></div>
        <div class="match">
        <div class="flag">${flag(m.home)}</div>
        <div class="team">${m.home}<span class="role">主队</span></div>
        <div class="score-box">${r[0]}-${r[1]}</div>
        <div class="team" style="color:#94a3b8">${m.away}<span class="role">客队</span></div>
        <div class="flag">${flag(m.away)}</div></div>
        <span class="result-tag">已结束</span></div>`;
    }else{
      const preds=predict(m.home,m.away);
      const hw=preds.filter(s=>parseInt(s.score.split('-')[0])>parseInt(s.score.split('-')[1])).reduce((a,b)=>a+parseFloat(b.prob),0);
      const aw=preds.filter(s=>parseInt(s.score.split('-')[0])<parseInt(s.score.split('-')[1])).reduce((a,b)=>a+parseFloat(b.prob),0);
      html+=`<div class="card" style="cursor:pointer" onclick="openScoreModal(SCHEDULE.find(x=>x.home==='${m.home}'&&x.away==='${m.away}'))">
        <div style="display:flex;justify-content:space-between;margin-bottom:2px">
        <span style="font-size:10px;color:#fbbf24">${m.grp}组 · 第${m.r}轮</span>
        <span style="font-size:9px;color:#64748b">${m.bjt} 北京时间</span></div>
        <div class="match">
        <div class="flag">${flag(m.home)}</div>
        <div class="team">${m.home}<span class="role">主队</span></div>
        <div class="vs">VS</div>
        <div class="team" style="color:#94a3b8">${m.away}<span class="role">客队</span></div>
        <div class="flag">${flag(m.away)}</div></div>
        <div style="font-size:9px;color:#64748b;margin:2px 0">AI预测比分</div>
        <div class="preds">`;
      for(const p of preds){
        html+=`<div class="pred"><div class="s">${p.score}</div><div class="p">${p.prob}%</div><div class="bar"><div class="bar-fill" style="width:${p.prob}%"></div></div></div>`;
      }
      html+=`</div><div class="wdl"><span>${m.home}胜 ${hw.toFixed(0)}%</span><span>平 ${(100-hw-aw).toFixed(0)}%</span><span>${m.away}胜 ${aw.toFixed(0)}%</span></div>
        <div style="font-size:8px;color:#334155;margin-top:3px">👆 点击输入实际比分</div></div>`;
    }
  }
  document.getElementById('matchList').innerHTML=html||'<div style="text-align:center;padding:40px;color:#64748b">今日无比赛</div>';
}

// RENDER: Group standings
// ═══════════════════════════════════════════
function renderGroups(){
  let html='';
  for(const g of Object.keys(GROUPS)){
    const s=getStandings(g);
    html+=`<div class="card"><h3>${g}组</h3><table class="standings">
      <tr><th>球队</th><th>赛</th><th>胜</th><th>平</th><th>负</th><th>进球</th><th>失球</th><th>净胜</th><th>分</th></tr>`;
    for(const t of s){
      let cls='';
      if(t.pos<=2)cls='advance';
      const allSt=JSON.parse(localStorage.getItem('wc2026results')||'{}');
      const groupResults=Object.entries(allSt).filter(([k])=>SCHEDULE.some(m=>matchKey(m)===k&&m.grp===g));
      if(groupResults.length===6&&t.pos===3){
        // All matches played — check if best 3rd
        const allStandings=getAllStandings();
        const thisTeam=allStandings.find(x=>x.name===t.name&&x.grp===g);
        if(thisTeam&&thisTeam.bestThird)cls='third-best';
      }
      html+=`<tr class="${cls}"><td>${flag(t.name)} ${t.name}</td><td>${t.pl}</td><td>${t.w}</td><td>${t.d}</td><td>${t.l}</td><td>${t.gf}</td><td>${t.ga}</td><td>${t.gd>0?'+':''}${t.gd}</td><td style="font-weight:900">${t.pts}</td></tr>`;
    }
    html+=`</table></div>`;
  }
  document.getElementById('groupStandings').innerHTML=html;
}

// ═══════════════════════════════════════════
// RENDER: Knockout bracket
// ═══════════════════════════════════════════
function getQualifiedTeams(){
  // Get top 2 from each group + 8 best 3rd place
  const all=getAllStandings();
  const qualified=[];
  for(const g of Object.keys(GROUPS)){
    const groupTeams=all.filter(t=>t.grp===g);
    qualified.push(...groupTeams.filter(t=>t.pos<=2).map(t=>({...t,seed:'G'+g+(t.pos)})));
  }
  const thirds=all.filter(t=>t.pos===3&&t.bestThird);
  thirds.forEach(t=>qualified.push({...t,seed:'3rd-'+t.thirdRank}));
  return qualified.sort((a,b)=>{
    const order={'G':0,'3':1};
    const aCat=a.seed[0],bCat=b.seed[0];
    return (order[aCat]||0)-(order[bCat]||0)||a.grp.localeCompare(b.grp)||a.pos-b.pos;
  });
}

function renderBracket(){
  const qualified=getQualifiedTeams();
  const totalQualified=qualified.filter(t=>t.pts>0||t.pl>0);
  const hasRealData=totalQualified.length>=4;

  // Build bracket slots
  const rounds=['1/16决赛','1/8决赛','1/4决赛','半决赛','决赛'];
  const slotsPerRound=[16,8,4,2,1];

  // If we have qualified teams, map them to bracket positions
  let bracketTeams=[];
  if(hasRealData){
    bracketTeams=qualified.slice(0,32);
  }

  let html='<div class="bracket">';
  for(let ri=0;ri<rounds.length;ri++){
    html+=`<div class="bracket-round"><div class="r-title">${rounds[ri]}</div>`;
    for(let si=0;si<slotsPerRound[ri];si++){
      const teamIdx=ri===0?si*2:-1;
      let content='';
      if(ri===0&&bracketTeams[si*2]&&bracketTeams[si*2+1]){
        const t1=bracketTeams[si*2],t2=bracketTeams[si*2+1];
        const winner=t1.pts>t2.pts?t1:t2; // simplistic
        content=`<div class="b-team">${flag(t1.name)} ${t1.name}</div>
          <div style="font-size:8px;color:#64748b">vs</div>
          <div class="b-team">${flag(t2.name)} ${t2.name}</div>
          <div class="b-note">${t1.grp}组${t1.pos} vs ${t2.grp}组${t2.pos}</div>`;
      }else if(ri===0){
        content=`<div class="b-team pending">待定</div><div style="font-size:8px;color:#64748b">vs</div><div class="b-team pending">待定</div>`;
      }else{
        content=`<div class="b-team pending">—</div><div class="b-note">R${ri+1}胜者</div>`;
      }
      html+=`<div class="bracket-slot" style="margin-bottom:${ri<3?4:0}px">${content}</div>`;
    }
    html+=`</div>`;
  }
  html+=`</div>`;

  if(!hasRealData){
    html='<div style="text-align:center;padding:40px;color:#64748b">⚠️ 小组赛数据不足，无法生成对阵<br><br>请先输入比赛结果（点击赛程中的比赛卡片）</div>';
  }
  document.getElementById('bracketView').innerHTML=html;
}

let currentView='schedule';
function switchView(v){
  currentView=v;
  document.querySelectorAll('#mainTabs .tab').forEach((t,i)=>{
    const views=['schedule','groups','bracket'];
    t.classList.toggle('active',views[i]===v);
  });
  document.getElementById('viewSchedule').style.display=v==='schedule'?'block':'none';
  document.getElementById('viewGroups').style.display=v==='groups'?'block':'none';
  document.getElementById('viewBracket').style.display=v==='bracket'?'block':'none';
  if(v==='groups')renderGroups();
  if(v==='bracket')renderBracket();
  if(v==='schedule')showDay(currentDay);
}
