<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>📸 多批次图片追踪</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f172a;color:#e2e8f0;font-family:'PingFang SC',sans-serif;min-height:100vh;display:flex;justify-content:center}
.app{max-width:700px;width:100%;padding:16px}
h1{text-align:center;color:#fbbf24;font-size:20px;margin-bottom:4px}
.sub{text-align:center;font-size:11px;color:#64748b;margin-bottom:14px}
.card{background:#1e293b;border-radius:14px;padding:14px;margin-bottom:10px;border:1px solid #334155}
.card h3{font-size:14px;color:#60a5fa;margin-bottom:6px}
.btn{padding:8px 16px;border-radius:8px;border:none;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;margin:3px}
.btn-blue{background:#2563eb;color:#fff}.btn-green{background:#059669;color:#fff}.btn-gray{background:#334155;color:#94a3b8}.btn-red{background:#dc2626;color:#fff;font-size:10px;padding:3px 8px}
.up{color:#ef4444}.down{color:#22c55e}
.batch{border:1px solid #334155;border-radius:12px;padding:12px;margin-bottom:8px;background:#0f172a}
.batch-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.batch-name{font-weight:700;font-size:14px;color:#fbbf24}
.batch-meta{font-size:11px;color:#64748b}
.stock-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr;gap:4px;font-size:11px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.03)}
.stock-row.header{color:#64748b;font-size:10px;font-weight:600}
input[type=file]{display:none}
#preview{max-width:100%;max-height:200px;border-radius:8px;display:none;margin:8px 0}
.code-tags{display:flex;flex-wrap:wrap;gap:4px;margin:8px 0}
.code-tag{background:#1e293b;border:1px solid #334155;padding:3px 8px;border-radius:6px;font-size:11px;font-family:monospace;display:flex;align-items:center;gap:4px}
.code-tag .x{color:#ef4444;cursor:pointer}
input[type=text]{width:100%;padding:8px;border-radius:8px;border:1px solid #334155;background:#0f172a;color:#e2e8f0;font-family:monospace;font-size:13px}
</style>
</head>
<body>
<div class="app">
  <h1>📸 多批次图片追踪</h1>
  <div class="sub">每天上传新图 → 自动创建独立批次 → 各批次分别追踪30天</div>
  <div class="card">
    <h3>📤 今日上传</h3>
    <input type="file" id="fileInput" accept="image/*" onchange="handleFile(event)">
    <button class="btn btn-blue" onclick="document.getElementById('fileInput').click()">选择图片</button>
    <button class="btn btn-gray" onclick="manualAdd()">手动输入</button>
    <img id="preview">
    <div id="newCodes" style="display:none;margin-top:8px">
      <div class="code-tags" id="newCodeTags"></div>
      <input type="text" id="codeInput" placeholder="手动添加，逗号分隔" onchange="addToNew(this.value);this.value=''">
      <div style="margin-top:8px;font-size:11px;color:#64748b" id="ocrMsg"></div>
      <button class="btn btn-green" onclick="confirmBatch()" style="margin-top:8px">✅ 确认创建批次</button>
    </div>
  </div>
  <div id="batchList"><div style="text-align:center;padding:30px;color:#64748b">暂无批次，请上传图片开始追踪</div></div>
</div>

<script>
let newCodes=[],batches=[];
(function load(){try{batches=JSON.parse(localStorage.getItem('img_batches')||'[]')}catch(e){batches=[]};renderBatches();if(batches.length>0)autoUpdate()})();
function save(){localStorage.setItem('img_batches',JSON.stringify(batches))}

async function handleFile(e){
  const file=e.target.files[0];if(!file)return;const img=document.getElementById('preview');img.src=URL.createObjectURL(file);img.style.display='block';document.getElementById('ocrMsg').textContent='⏳ 识别中...';document.getElementById('newCodes').style.display='block';
  try{
    if(typeof Tesseract==='undefined'){const s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';await new Promise(r=>{s.onload=r;document.head.appendChild(s)})}
    const bmp=await createImageBitmap(file);const c=document.createElement('canvas');const x=c.getContext('2d');c.width=bmp.width;c.height=bmp.height;x.drawImage(bmp,0,0);
    const{data:{text}}=await Tesseract.recognize(c,'chi_sim+eng');
    newCodes=[...new Set((text.match(/\b[0368]\d{5}\b/g)||[]).filter(c=>c[0]!=='0'||c>'000900'))];
    document.getElementById('ocrMsg').textContent='识别到 '+newCodes.length+' 个代码';
  }catch(e){document.getElementById('ocrMsg').textContent='OCR失败，请手动输入';newCodes=[]}
  renderNewCodes();
}
function manualAdd(){document.getElementById('newCodes').style.display='block';newCodes=[];renderNewCodes()}
function renderNewCodes(){document.getElementById('newCodeTags').innerHTML=newCodes.map((c,i)=>'<span class="code-tag">'+c+'<span class="x" onclick="newCodes.splice('+i+',1);renderNewCodes()">×</span></span>').join('')||'<span style="color:#64748b">请添加股票代码</span>'}
function addToNew(v){(v||'').match(/\d{6}/g)?.forEach(c=>{if(!newCodes.includes(c))newCodes.push(c)});renderNewCodes()}

async function confirmBatch(){
  if(newCodes.length===0){alert('请添加代码');return}
  const qt=newCodes.map(c=>(c[0]==='6'||c[0]==='5'||c[0]==='9'?'sh':'sz')+c).join(',');const stocks=[];
  try{const r=await fetch('https://qt.gtimg.cn/q='+qt);const b=await r.arrayBuffer();const t=new TextDecoder('gbk').decode(b);
    for(const l of t.split(';')){if(!l.includes('="'))continue;const m=l.match(/="(.+)"/);if(!m)continue;const f=m[1].split('~');if(f.length<50)continue;stocks.push({code:f[2],name:f[1],open:+f[5]||0,close:+f[3]||0,prev:+f[4]||0})}
  }catch(e){}
  const today=new Date().toISOString().slice(0,10);
  batches.unshift({id:Date.now(),date:today,label:'批次'+today,codes:newCodes,stocks:stocks.map(s=>({...s,records:[{date:today,open:s.open,close:s.close,chg:((s.close-s.prev)/s.prev*100).toFixed(1)}]}))});
  save();newCodes=[];document.getElementById('newCodes').style.display='none';document.getElementById('preview').style.display='none';document.getElementById('fileInput').value='';renderBatches();
}

async function autoUpdate(){
  const allCodes=[...new Set(batches.flatMap(b=>b.codes||[]))];if(!allCodes.length)return;
  const qt=allCodes.map(c=>(c[0]==='6'||c[0]==='5'||c[0]==='9'?'sh':'sz')+c).join(',');let pm={};
  try{const r=await fetch('https://qt.gtimg.cn/q='+qt);const b=await r.arrayBuffer();const t=new TextDecoder('gbk').decode(b);
    for(const l of t.split(';')){if(!l.includes('="'))continue;const m=l.match(/="(.+)"/);if(!m)continue;const f=m[1].split('~');if(f.length<50)continue;pm[f[2]]={open:+f[5]||0,close:+f[3]||0,prev:+f[4]||0,name:f[1]}}
  }catch(e){}
  const today=new Date().toISOString().slice(0,10);let ch=false;
  for(const bt of batches){for(const s of bt.stocks){const p=pm[s.code];if(!p)continue;s.name=s.name||p.name;const last=s.records[s.records.length-1];if(!last||last.date!==today){s.records.push({date:today,open:p.open,close:p.close,chg:((p.close-p.prev)/p.prev*100).toFixed(1)});if(s.records.length>30)s.records=s.records.slice(-30);ch=true}}}
  if(ch)save();renderBatches();
}

function renderBatches(){
  const div=document.getElementById('batchList');if(!batches.length){div.innerHTML='<div style="text-align:center;padding:30px;color:#64748b">暂无批次</div>';return}
  let html='';
  for(let bi=0;bi<batches.length;bi++){const b=batches[bi];let up=0,down=0;
    for(const s of b.stocks){const last=s.records[s.records.length-1];if(last&&+last.chg>0)up++;else down++}
    const days=b.stocks[0]?.records?.length||0;
    html+='<div class="batch"><div class="batch-header"><div><span class="batch-name">'+b.label+'</span><span class="batch-meta"> · '+b.codes.length+'只 · '+days+'天 · '+up+'涨'+down+'跌</span></div><div><button class="btn btn-gray" style="font-size:10px;padding:4px 8px" onclick="exportBatch('+bi+')">📥</button><button class="btn btn-red" onclick="if(confirm(\'删除？\')){batches.splice('+bi+',1);save();renderBatches()}">×</button></div></div><div class="stock-row header"><span>代码</span><span>名称</span><span>开盘</span><span>收盘</span><span>涨跌</span></div>';
    for(const s of b.stocks){const last=s.records[s.records.length-1];const chg=last?+last.chg:0;html+='<div class="stock-row"><span style="font-family:monospace">'+s.code+'</span><span>'+ (s.name||'-')+'</span><span>'+(last?.open?.toFixed(2)||'-')+'</span><span>'+(last?.close?.toFixed(2)||'-')+'</span><span class="'+(chg>0?'up':'down')+'">'+(chg>0?'+':'')+(last?.chg||'0')+'%</span></div>'}
    html+='<div class="batch-stats" style="font-size:11px;color:#94a3b8;margin-top:6px;padding-top:6px;border-top:1px solid rgba(255,255,255,0.05)">📅 创建于'+b.date+' · 累计'+days+'天</div></div>';
  }
  div.innerHTML=html;
}

function exportBatch(i){const b=batches[i];const dates=[...new Set(b.stocks.flatMap(s=>s.records.map(r=>r.date)))].sort();let csv='代码,名称,'+dates.join(',')+'\n';for(const s of b.stocks){csv+=s.code+','+s.name+','+dates.map(d=>{const r=s.records.find(x=>x.date===d);return r?r.close:'-'}).join(',')+'\n'}const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=b.label+'.csv';a.click()}
setInterval(autoUpdate,300000);
</script>
</body>
</html>
