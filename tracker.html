<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>рҹ“ё еӣҫзүҮйҖүиӮЎиҝҪиёӘ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f172a;color:#e2e8f0;font-family:'PingFang SC',sans-serif;min-height:100vh;display:flex;justify-content:center}
.app{max-width:700px;width:100%;padding:16px}
h1{text-align:center;color:#fbbf24;font-size:20px;margin-bottom:10px}
.up{color:#ef4444}.down{color:#22c55e}
.card{background:#1e293b;border-radius:14px;padding:14px;margin-bottom:10px;border:1px solid #334155}
.btn{padding:10px 20px;border-radius:10px;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;margin:3px}
.btn-blue{background:#2563eb;color:#fff}.btn-green{background:#059669;color:#fff}.btn-gray{background:#334155;color:#94a3b8}
input[type=file]{display:none}
#preview{max-width:100%;max-height:180px;border-radius:8px;display:none;margin:8px 0}

.tabs{display:flex;gap:4px;margin-bottom:10px;overflow-x:auto;flex-wrap:wrap}
.tab{padding:6px 14px;border-radius:20px;border:1px solid #334155;background:#1e293b;color:#94a3b8;font-size:11px;cursor:pointer;white-space:nowrap;font-family:inherit;transition:.15s}
.tab.active{background:#2563eb;color:#fff;border-color:#2563eb;font-weight:700}

.stock-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr;gap:4px;font-size:11px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.03)}
.stock-row.header{color:#64748b;font-size:10px;font-weight:600}
.meta{font-size:10px;color:#64748b;margin:4px 0}
</style>
</head>
<body>
<div class="app">
  <h1>рҹ“ё еӣҫзүҮйҖүиӮЎиҝҪиёӘ</h1>

  <div class="card">
    <input type="file" id="fileInput" accept="image/*" onchange="handleFile(event)">
    <button class="btn btn-blue" onclick="document.getElementById('fileInput').click()">рҹ“Ө дёҠдј еӣҫзүҮ</button>
    <button class="btn btn-gray" onclick="exportAll()">рҹ’ҫ еҜјеҮәJSON</button>
    <input type="file" id="importFile" accept=".json" onchange="importAll(event)" style="display:none">
    <button class="btn btn-gray" onclick="document.getElementById('importFile').click()">рҹ“Ҙ еҜје…ҘJSON</button>
    <span style="font-size:10px;color:#64748b;display:block;margin-top:4px">рҹ’Ў з”өи„‘еҜјеҮәJSON вҶ’ йҡ”з©әжҠ•йҖҒжүӢжңә вҶ’ жүӢжңәеҜје…Ҙ вҶ’ дёӨз«ҜеҗҢжӯҘ</span>
    <img id="preview">
    <div id="uploadStatus" style="font-size:12px;color:#64748b;margin-top:6px"></div>
  </div>

  <div class="tabs" id="tabs"></div>
  <div id="batchContent"><div style="text-align:center;padding:40px;color:#64748b">рҹ‘Ҷ дёҠдј дёҖеј иӮЎзҘЁжҲӘеӣҫејҖе§ӢиҝҪиёӘ</div></div>
</div>

<script>
let batches=[],activeIdx=-1;
function preloadOCR(){if(typeof Tesseract==='undefined'){const s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';s.onload=()=>{Tesseract.recognize(document.createElement('canvas'),'chi_sim').catch(()=>{})};document.head.appendChild(s)}}
function save(){localStorage.setItem('img_batches',JSON.stringify(batches))}

// еҜјеҮә/еҜје…ҘJSON
function exportAll(){const blob=new Blob([JSON.stringify(batches)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='иӮЎзҘЁиҝҪиёӘеӨҮд»Ҫ_'+new Date().toISOString().slice(0,10)+'.json';a.click()}
function importAll(e){const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=()=>{try{const d=JSON.parse(reader.result);if(confirm('еҜје…Ҙ '+d.length+' дёӘжү№ж¬Ўпјҹе°ҶжӣҝжҚўеҪ“еүҚж•°жҚ®')){batches=d;save();activeIdx=0;renderTabs();renderBatch();alert('вң… еҜје…ҘжҲҗеҠҹпјҒ')}}catch(ex){alert('вқҢ ж–Үд»¶ж јејҸй”ҷиҜҜ')}};reader.readAsText(file)}

// еҗҜеҠЁ
(function init(){try{batches=JSON.parse(localStorage.getItem('img_batches')||'[]')}catch(e){batches=[]};if(batches.length>0){activeIdx=0;renderTabs();renderBatch()}autoUpdate();preloadOCR()})();

async function handleFile(e){
  const file=e.target.files[0];if(!file)return;
  const img=document.getElementById('preview');img.src=URL.createObjectURL(file);img.style.display='block';
  document.getElementById('uploadStatus').textContent='вҸі жӯЈеңЁOCRиҜҶеҲ«...';

  let codes=[];
  try{
    while(typeof Tesseract==='undefined'){await new Promise(r=>setTimeout(r,300))}
    const bmp=await createImageBitmap(file);const scale=Math.min(1,800/bmp.width);const c=document.createElement('canvas');const x=c.getContext('2d');c.width=bmp.width*scale;c.height=bmp.height*scale;x.drawImage(bmp,0,0,c.width,c.height);
    const{data:{text}}=await Tesseract.recognize(c,'chi_sim',{logger:m=>{if(m.status==='recognizing text')document.getElementById('uploadStatus').textContent='вҸі OCR '+Math.round(m.progress*100)+'%'}});
    codes=[...new Set((text.match(/\b[0368]\d{5}\b/g)||[]).filter(c=>c[0]!=='0'||c>'000900'))];
  }catch(e){document.getElementById('uploadStatus').textContent='вқҢ OCRеӨұиҙҘпјҢиҜ·йҮҚиҜ•';return}

  if(codes.length===0){document.getElementById('uploadStatus').textContent='вҡ пёҸ жңӘиҜҶеҲ«еҲ°иӮЎзҘЁд»Јз ҒпјҢиҜ·жЈҖжҹҘеӣҫзүҮ';return}

  // жӢүеҸ–еҪ“еүҚд»·ж ј
  const qt=codes.map(c=>(c[0]==='6'||c[0]==='5'||c[0]==='9'?'sh':'sz')+c).join(',');const stocks=[];
  try{const r=await fetch('https://qt.gtimg.cn/q='+qt);const b=await r.arrayBuffer();const t=new TextDecoder('gbk').decode(b);
    for(const l of t.split(';')){if(!l.includes('="'))continue;const m=l.match(/="(.+)"/);if(!m)continue;const f=m[1].split('~');if(f.length<50)continue;stocks.push({code:f[2],name:f[1],open:+f[5]||0,close:+f[3]||0,prev:+f[4]||0})}
  }catch(e){}

  // д»Һж–Үд»¶иҜ»еҸ–жҲӘеӣҫж—¶й—ҙ
  let photoDate=new Date();
  try{
    // е°қиҜ•иҜ»еҸ–EXIF
    const arrayBuffer=await file.arrayBuffer();
    const dv=new DataView(arrayBuffer);
    if(dv.getUint16(0,false)===0xFFD8){ // JPEG
      let offset=2;
      while(offset<dv.byteLength){if(dv.getUint16(offset,false)===0xFFE1){const exifStart=offset+4;const exifStr=String.fromCharCode(...new Uint8Array(arrayBuffer.slice(exifStart,exifStart+100)));const dateMatch=exifStr.match(/(\d{4}):(\d{2}):(\d{2}) (\d{2}):(\d{2}):(\d{2})/);if(dateMatch){photoDate=new Date(+dateMatch[1],+dateMatch[2]-1,+dateMatch[3],+dateMatch[4],+dateMatch[5],+dateMatch[6]);break}}offset+=2+dv.getUint16(offset+2,false)}}else{photoDate=new Date(file.lastModified)}
  }catch(e){photoDate=new Date(file.lastModified)}
  const today=photoDate.toISOString().slice(0,10);
  const time=String(photoDate.getHours()).padStart(2,'0')+':'+String(photoDate.getMinutes()).padStart(2,'0');
  const label=today+' '+time;

  // з”ҹжҲҗзј©з•Ҙеӣҫ
  let thumb='';
  try{const tc=document.createElement('canvas');const tx=tc.getContext('2d');const scale=Math.min(1,300/img.naturalWidth);tc.width=img.naturalWidth*scale;tc.height=img.naturalHeight*scale;tx.drawImage(img,0,0,tc.width,tc.height);thumb=tc.toDataURL('image/jpeg',0.6)}catch(e){}
  batches.unshift({id:Date.now(),date:today,time:time,label:label,fileName:file.name||'жҲӘеӣҫ',codes:codes,thumb:thumb,created:now.toISOString(),downloads:[],stocks:stocks.map(s=>({...s,records:[{date:today,time:time,open:s.open,close:s.close,chg:((s.close-s.prev)/s.prev*100).toFixed(1)}]}))});
  save();activeIdx=0;renderTabs();renderBatch();
  document.getElementById('uploadStatus').textContent='вң… иҜҶеҲ« '+codes.length+' еҸӘиӮЎзҘЁпјҢе·ІеҲӣе»әжү№ж¬Ў';document.getElementById('fileInput').value='';
}

async function autoUpdate(){
  const allCodes=[...new Set(batches.flatMap(b=>b.codes||[]))];if(!allCodes.length)return;
  const qt=allCodes.map(c=>(c[0]==='6'||c[0]==='5'||c[0]==='9'?'sh':'sz')+c).join(',');let pm={};
  try{const r=await fetch('https://qt.gtimg.cn/q='+qt);const b=await r.arrayBuffer();const t=new TextDecoder('gbk').decode(b);
    for(const l of t.split(';')){if(!l.includes('="'))continue;const m=l.match(/="(.+)"/);if(!m)continue;const f=m[1].split('~');if(f.length<50)continue;pm[f[2]]={open:+f[5]||0,close:+f[3]||0,prev:+f[4]||0,name:f[1]}}
  }catch(e){}
  const today=new Date().toISOString().slice(0,10);const time=new Date().toTimeString().slice(0,5);let ch=false;
  for(const bt of batches){for(const s of bt.stocks){const p=pm[s.code];if(!p)continue;s.name=s.name||p.name;const last=s.records[s.records.length-1];if(!last||last.date!==today){s.records.push({date:today,time:time,open:p.open,close:p.close,chg:((p.close-p.prev)/p.prev*100).toFixed(1)});if(s.records.length>30)s.records=s.records.slice(-30);ch=true}}}
  if(ch){save();if(activeIdx>=0)renderBatch()}
}

function renderTabs(){
  document.getElementById('tabs').innerHTML=batches.map((b,i)=>
    '<span class="tab'+(i===activeIdx?' active':'')+'" onclick="activeIdx='+i+';renderTabs();renderBatch()">рҹ“ё '+b.label+' ('+b.codes.length+'еҸӘ)</span>'
  ).join('');
}

function renderBatch(){
  if(activeIdx<0||activeIdx>=batches.length){document.getElementById('batchContent').innerHTML='<div style="text-align:center;padding:40px;color:#64748b">рҹ‘Ҷ дёҠдј дёҖеј иӮЎзҘЁжҲӘеӣҫејҖе§ӢиҝҪиёӘ</div>';return}
  const b=batches[activeIdx];let up=0,down=0;
  for(const s of b.stocks){const last=s.records[s.records.length-1];if(last&&+last.chg>0)up++;else down++}
  const days=b.stocks[0]?.records?.length||0;
  const created=new Date(b.created).toLocaleString('zh-CN');
  const lastDL=b.downloads.length>0?new Date(b.downloads[b.downloads.length-1]).toLocaleString('zh-CN'):'жңӘдёӢиҪҪ';

  let html='<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div><span style="font-weight:700;color:#fbbf24;font-size:15px">рҹ“ё '+b.label+'</span></div><button class="btn btn-green" onclick="downloadBatch('+activeIdx+')">рҹ“Ҙ дёӢиҪҪExcel</button></div>';
  html+='<div class="meta">рҹ“… еҲӣе»әж—¶й—ҙпјҡ'+created+' | рҹ–јпёҸ жҲӘеӣҫпјҡ'+ (b.fileName||'жңӘзҹҘ')+'</div>';
  if(b.thumb)html+='<img src="'+b.thumb+'" style="max-width:200px;max-height:120px;border-radius:8px;margin:6px 0;display:block">';
  html+='<div class="meta">рҹ“Ҙ дёҠж¬ЎдёӢиҪҪпјҡ'+lastDL+' | рҹ“Ҡ '+b.codes.length+'еҸӘиӮЎзҘЁ В· е·ІиҝҪиёӘ'+days+'еӨ© В· '+up+'ж¶Ё'+down+'и·Ң</div>';
  html+='<div class="stock-row header" style="margin-top:8px"><span>д»Јз Ғ</span><span>еҗҚз§°</span><span>ејҖзӣҳ</span><span>ж”¶зӣҳ</span><span>ж¶Ёи·Ң</span></div>';
  for(const s of b.stocks){const last=s.records[s.records.length-1];const chg=last?+last.chg:0;html+='<div class="stock-row"><span style="font-family:monospace">'+s.code+'</span><span>'+ (s.name||'-')+'</span><span>'+(last?.open?.toFixed(2)||'-')+'</span><span>'+(last?.close?.toFixed(2)||'-')+'</span><span class="'+(chg>0?'up':'down')+'">'+(chg>0?'+':'')+(last?.chg||'0')+'%</span></div>'}
  // еҺҶеҸІи®°еҪ•
  html+='<div style="margin-top:10px;font-size:10px;color:#64748b;max-height:150px;overflow-y:auto">';
  const allDates=[...new Set(b.stocks.flatMap(s=>s.records.map(r=>r.date)))].sort();
  html+=allDates.map(d=>{const r=b.stocks[0]?.records.find(x=>x.date===d); const t=r?.time||''; return '<div style="padding:2px 0;border-bottom:1px solid rgba(255,255,255,0.02)">рҹ“… '+d+' '+t+' В· и®°еҪ•ејҖзӣҳ/ж”¶зӣҳ</div>'}).join('');
  html+='</div></div>';
  document.getElementById('batchContent').innerHTML=html;
}

function downloadBatch(i){
  const b=batches[i];
  b.downloads.push(new Date().toISOString());save();
  const dates=[...new Set(b.stocks.flatMap(s=>s.records.map(r=>r.date)))].sort();
  let csv='жҲӘеӣҫж–Үд»¶,'+(b.fileName||'жңӘзҹҘ')+'\nжҲӘеӣҫж—¶й—ҙ,'+new Date(b.created).toLocaleString('zh-CN')+'\nдёӢиҪҪж—¶й—ҙ,'+new Date().toLocaleString('zh-CN')+'\nиӮЎзҘЁж•°йҮҸ,'+b.codes.length+'еҸӘ\n\nд»Јз Ғ,еҗҚз§°';
  for(const d of dates){csv+=','+d+'ејҖзӣҳ,'+d+'ж”¶зӣҳ,'+d+'ж¶Ёи·Ң'}
  csv+='\n';
  for(const s of b.stocks){csv+=s.code+','+s.name;for(const d of dates){const r=s.records.find(x=>x.date===d);csv+=','+(r?r.open.toFixed(2):'-')+','+(r?r.close.toFixed(2):'-')+','+(r?r.chg+'%':'-')}csv+='\n'}
  const blob=new Blob(['п»ҝ'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=b.label.replace(/\s/g,'_')+'.csv';a.click();
  renderBatch();
}
setInterval(autoUpdate,300000);
</script>
</body>
</html>
