<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🏆 2026世界杯 AI预测</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;color:#e2e8f0;font-family:'PingFang SC',sans-serif;min-height:100vh;display:flex;justify-content:center}
.app{max-width:660px;width:100%;padding:16px}
h1{text-align:center;color:#fbbf24;font-size:22px;margin-bottom:2px}
.sub{text-align:center;font-size:10px;color:#64748b;margin-bottom:8px}
.card{background:#111;border-radius:14px;padding:14px;margin-bottom:8px;border:1px solid #222}
h3{font-size:13px;color:#fbbf24;margin-bottom:6px}
.up{color:#ef4444}.down{color:#22c55e}
.tabs{display:flex;gap:4px;margin-bottom:10px}
.tab{padding:7px 12px;border-radius:20px;border:1px solid #334155;background:#111;color:#94a3b8;font-size:11px;cursor:pointer;font-family:inherit}
.tab.active{background:#fbbf24;color:#0a0a1a;border-color:#fbbf24;font-weight:700}
.match{display:flex;align-items:center;gap:8px;padding:6px 0}
.match .flag{font-size:28px;width:36px;text-align:center}
.match .team{flex:1;font-size:13px;font-weight:700}
.match .role{font-size:9px;color:#64748b;display:block}
.match .vs{font-size:16px;font-weight:900;color:#334155}
.preds{display:flex;gap:4px;margin-top:6px}
.pred{flex:1;text-align:center;background:#1a1a2e;border-radius:8px;padding:6px 3px}
.pred .s{font-size:15px;font-weight:700;font-family:monospace;color:#fbbf24}
.pred .p{font-size:9px;color:#64748b}
.bar{height:3px;border-radius:2px;margin-top:2px;background:#222;overflow:hidden}
.bar-fill{height:100%;background:#fbbf24}
.wdl{display:flex;gap:12px;font-size:10px;color:#94a3b8;margin-top:4px}
.result{display:inline-block;padding:2px 10px;border-radius:4px;font-size:12px;font-weight:700;color:#fbbf24;background:rgba(251,191,36,.15);margin-left:8px}
</style>
</head>
<body>
<div class="app">
  <h1>🏆 2026世界杯 AI预测</h1>
  <div class="sub">真实赛程+FIFA排名+博彩赔率 | 数据源：FIFA官方+BetMGM</div>

  <div class="tabs"><button class="tab active" onclick="showDay(0)">6/11 周四</button><button class="tab" onclick="showDay(1)">6/12 周五</button><button class="tab" onclick="showDay(2)">6/13 周六</button><button class="tab" onclick="showDay(3)">6/14 周日</button></div>
  <div id="matchList"></div>
</div>

<script>
// FIFA官方排名（最新）+ 博彩赔率
const TEAMS={
  '阿根廷':{r:2,o:800},'法国':{r:3,o:450},'英格兰':{r:4,o:600},'巴西':{r:1,o:750},'西班牙':{r:5,o:450},
  '德国':{r:6,o:1300},'荷兰':{r:7,o:1700},'葡萄牙':{r:8,o:800},'意大利':{r:9,o:6600},'墨西哥':{r:14,o:6600},
  '哥伦比亚':{r:10,o:4000},'摩洛哥':{r:19,o:4000},'日本':{r:15,o:5000},'美国':{r:16,o:5000},
  '挪威':{r:11,o:2500},'比利时':{r:12,o:3300},'克罗地亚':{r:17,o:7000},'乌拉圭':{r:13,o:10000},
  '加拿大':{r:25,o:15000},'奥地利':{r:22,o:15000},'瑞士':{r:18,o:15000},'土耳其':{r:28,o:10000},
  '瑞典':{r:27,o:15000},'韩国':{r:21,o:15000},'澳大利亚':{r:29,o:20000},'捷克':{r:36,o:50000},
  '巴拉圭':{r:50,o:20000},'苏格兰':{r:39,o:25000},'南非':{r:60,o:25000},'卡塔尔':{r:52,o:50000},
  '伊朗':{r:23,o:25000},'沙特':{r:53,o:25000},'突尼斯':{r:41,o:50000},'埃及':{r:33,o:15000},
  '厄瓜多尔':{r:24,o:25000},'科特迪瓦':{r:38,o:25000},'波黑':{r:56,o:50000},'海地':{r:84,o:100000},
  '库拉索':{r:89,o:100000},'新西兰':{r:90,o:50000},'阿联酋':{r:68,o:50000},'中国':{r:78,o:50000},
};
function getStrength(name){
  const t=TEAMS[name];if(!t)return 20;
  return Math.max(5,80-t.r*0.3-Math.log10(t.o||50000)*10);
}

const SCHEDULE=[
  {d:0,grp:'A',et:'15:00',bjt:'6/12 03:00',home:'墨西哥',away:'南非',result:'2-0'},
  {d:0,grp:'A',et:'22:00',bjt:'6/12 10:00',home:'韩国',away:'捷克'},
  {d:1,grp:'B',et:'15:00',bjt:'6/13 03:00',home:'加拿大',away:'波黑'},
  {d:1,grp:'D',et:'21:00',bjt:'6/13 09:00',home:'美国',away:'巴拉圭'},
  {d:2,grp:'B',et:'15:00',bjt:'6/14 03:00',home:'卡塔尔',away:'瑞士'},
  {d:2,grp:'C',et:'18:00',bjt:'6/14 06:00',home:'巴西',away:'摩洛哥'},
  {d:2,grp:'C',et:'21:00',bjt:'6/14 09:00',home:'海地',away:'苏格兰'},
  {d:2,grp:'D',et:'24:00',bjt:'6/14 12:00',home:'澳大利亚',away:'土耳其'},
  {d:3,grp:'E',et:'13:00',bjt:'6/15 01:00',home:'德国',away:'库拉索'},
  {d:3,grp:'F',et:'16:00',bjt:'6/15 04:00',home:'荷兰',away:'日本'},
  {d:3,grp:'E',et:'19:00',bjt:'6/15 07:00',home:'科特迪瓦',away:'厄瓜多尔'},
  {d:3,grp:'F',et:'22:00',bjt:'6/15 10:00',home:'瑞典',away:'突尼斯'},
];

function flag(n){
  const m={'巴西':'🇧🇷','阿根廷':'🇦🇷','法国':'🇫🇷','英格兰':'🏴󠁧󠁢󠁥󠁮󠁧󠁿','西班牙':'🇪🇸','德国':'🇩🇪','荷兰':'🇳🇱','葡萄牙':'🇵🇹','意大利':'🇮🇹','墨西哥':'🇲🇽','哥伦比亚':'🇨🇴','乌拉圭':'🇺🇾','日本':'🇯🇵','美国':'🇺🇸','韩国':'🇰🇷','南非':'🇿🇦','瑞士':'🇨🇭','土耳其':'🇹🇷','捷克':'🇨🇿','加拿大':'🇨🇦','挪威':'🇳🇴','比利时':'🇧🇪','摩洛哥':'🇲🇦','瑞典':'🇸🇪','苏格兰':'🏴󠁧󠁢󠁳󠁣󠁴󠁿','伊朗':'🇮🇷','澳大利亚':'🇦🇺','卡塔尔':'🇶🇦','新西兰':'🇳🇿','阿联酋':'🇦🇪','中国':'🇨🇳','克罗地亚':'🇭🇷','沙特':'🇸🇦','埃及':'🇪🇬','巴拉圭':'🇵🇾','奥地利':'🇦🇹','海地':'🇭🇹','波黑':'🇧🇦','科特迪瓦':'🇨🇮','厄瓜多尔':'🇪🇨','突尼斯':'🇹🇳','库拉索':'🇨🇼'};
  return m[n]||'🏳️'
}

function predict(home,away){
  const sh=getStrength(home),sa=getStrength(away);
  const lh=Math.max(0.3,1.6+(sh-sa)*0.02),la=Math.max(0.2,1.6+(sa-sh)*0.02);
  const scores=[];
  for(let h=0;h<=6;h++)for(let a=0;a<=6;a++){const ph=Math.exp(-lh)*Math.pow(lh,h)/fact(h),pa=Math.exp(-la)*Math.pow(la,a)/fact(a);if(ph*pa>0.002)scores.push({h,a,p:ph*pa})}
  scores.sort((a,b)=>b.p-a.p);
  return scores.slice(0,3).map(s=>({score:s.h+'-'+s.a,prob:(s.p*100).toFixed(1)}));
}
function fact(n){let r=1;for(let i=2;i<=n;i++)r*=i;return r}

function showDay(d){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===d));
  let html='';
  for(const m of SCHEDULE.filter(x=>x.d===d)){
    if(m.result){html+='<div class="card" style="opacity:0.7"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:11px;color:#fbbf24">'+m.grp+'组</span><span style="font-size:10px;color:#64748b">已结束</span></div><div class="match"><div class="flag">'+flag(m.home)+'</div><div class="team">'+m.home+'<span class="role">主队</span></div><div style="font-size:20px;font-weight:900;font-family:monospace;color:#fbbf24">'+m.result+'</div><div class="team" style="color:#94a3b8">'+m.away+'<span class="role">客队</span></div><div class="flag">'+flag(m.away)+'</div></div></div>';continue}
    const preds=predict(m.home,m.away);
    const hw=preds.filter(s=>parseInt(s.score)>parseInt(s.score.split('-')[1])).reduce((a,b)=>a+parseFloat(b.prob),0);
    const aw=preds.filter(s=>parseInt(s.score)<parseInt(s.score.split('-')[1])).reduce((a,b)=>a+parseFloat(b.prob),0);
    html+='<div class="card"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:11px;color:#fbbf24">'+m.grp+'组</span><span style="font-size:10px;color:#64748b">🇺🇸 ET '+m.et+'</span><span style="font-size:10px;color:#94a3b8">🇨🇳 '+m.bjt+'</span></div>';
    html+='<div class="match"><div class="flag">'+flag(m.home)+'</div><div class="team">'+m.home+'<span class="role">主队</span></div><div class="vs">VS</div><div class="team" style="color:#94a3b8">'+m.away+'<span class="role">客队</span></div><div class="flag">'+flag(m.away)+'</div></div>';
    html+='<div style="font-size:10px;color:#64748b;margin:4px 0">预测比分（主队在前）</div><div class="preds">';
    for(const p of preds){html+='<div class="pred"><div class="s">'+p.score+'</div><div class="p">'+p.prob+'%</div><div class="bar"><div class="bar-fill" style="width:'+p.prob+'%"></div></div></div>'}
    html+='</div><div class="wdl"><span>'+m.home+'胜 '+hw.toFixed(0)+'%</span><span>平 '+(100-hw-aw).toFixed(0)+'%</span><span>'+m.away+'胜 '+aw.toFixed(0)+'%</span></div></div>';
  }
  document.getElementById('matchList').innerHTML=html||'<div style="text-align:center;padding:40px;color:#64748b">今日无比赛</div>';
}
showDay(0);
</script>
</body>
</html>
