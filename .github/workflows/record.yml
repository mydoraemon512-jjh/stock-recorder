name: 每日荐股记录

on:
  schedule:
    - cron: '30 1 * * 1-5'   # 北京时间 9:30 (UTC 1:30)
    - cron: '1 7 * * 1-5'    # 北京时间 15:00 (UTC 7:00)
  workflow_dispatch:

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: node record.js
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: '📊 更新每日荐股记录'
          file_pattern: 'records.json'
